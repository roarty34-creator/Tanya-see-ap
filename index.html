<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Tanya Deep Sea Fishing App</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#061225">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#061225;
color:white;
padding:16px;
}

h1{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
margin:0 0 10px;
}

.topnav{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:10px;
}

.navbtn{
background:#0f1c38;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
font-weight:bold;
}

.navbtn.active{
background:#2fa4ff;
color:#02111f;
}

.card{
background:#0f1c38;
padding:14px;
border-radius:12px;
margin-bottom:10px;
}

label{
display:block;
font-size:12px;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#081632;
color:white;
}

button{
margin-top:10px;
background:#2fa4ff;
border:none;
padding:10px;
border-radius:8px;
color:#001420;
font-weight:bold;
}

#map{
height:420px;
border-radius:12px;
}

img.photo{
width:100%;
border-radius:12px;
margin-top:10px;
}

section{
display:none;
}

</style>
</head>

<body>

<h1>
<img src="icon-192.png" width="30">
Tanya Deep Sea
</h1>

<div class="topnav">
<button class="navbtn" onclick="showTab('add')" id="btnAdd">Add Catch</button>
<button class="navbtn" onclick="showTab('mapTab')" id="btnMap">Map</button>
<button class="navbtn" onclick="showTab('log')" id="btnLog">Log</button>
</div>

<section id="add">

<div class="card">

<label>Species</label>
<select id="species">
<option value="">Choose...</option>
<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Silverfish</option>
<option>Red Steenbras</option>
<option>Yellow Belly</option>
<option>Galjoen</option>
<option>Hottentot</option>
</select>

<label>Length (cm)</label>
<input id="length">

<label>Minimum Size</label>
<input id="minSize" readonly>

<label>Bait Used</label>
<input id="bait">

<label>Depth (m)</label>
<input id="depth">

<label>Coordinates</label>
<input id="coords" readonly>

<button onclick="getGPS()">Get GPS</button>

<label>Photo</label>
<input id="photo" type="file" accept="image/*">

<label>Notes</label>
<textarea id="notes"></textarea>

<button onclick="saveCatch()">Save Catch</button>

</div>

</section>

<section id="mapTab">

<div class="card">

<button onclick="toggleSatellite()">Satellite ON/OFF</button>

</div>

<div id="map"></div>

</section>

<section id="log">

<div id="catchList"></div>

</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const KEY="tanya_fishing_log"

const MIN_SIZE={
"Cape Kob":60,
"Yellowtail":60,
"Bonito":0,
"Red Roman":30,
"Snapper":30,
"Silverfish":25,
"Red Steenbras":60,
"Yellow Belly":30,
"Galjoen":35,
"Hottentot":22
}

const species=document.getElementById("species")
const length=document.getElementById("length")
const minSize=document.getElementById("minSize")
const coords=document.getElementById("coords")
const bait=document.getElementById("bait")
const depth=document.getElementById("depth")
const notes=document.getElementById("notes")
const photo=document.getElementById("photo")

species.onchange=()=>{
minSize.value=MIN_SIZE[species.value]||""
}

function showTab(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"

document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"))

if(id==="add")btnAdd.classList.add("active")
if(id==="mapTab")btnMap.classList.add("active")
if(id==="log")btnLog.classList.add("active")

if(id==="mapTab")initMap()
if(id==="log")renderLog()

}

function getGPS(){

navigator.geolocation.getCurrentPosition(p=>{
coords.value=p.coords.latitude.toFixed(6)+","+p.coords.longitude.toFixed(6)
})

}

function getAll(){
return JSON.parse(localStorage.getItem(KEY)||"[]")
}

function saveAll(data){
localStorage.setItem(KEY,JSON.stringify(data))
}

function saveCatch(){

const list=getAll()

list.push({
id:Date.now(),
species:species.value,
length:length.value,
min:minSize.value,
coords:coords.value,
bait:bait.value,
depth:depth.value,
notes:notes.value,
date:new Date().toLocaleDateString()
})

saveAll(list)

species.value=""
length.value=""
minSize.value=""
coords.value=""
bait.value=""
depth.value=""
notes.value=""

showTab("log")

}

function renderLog(){

const list=getAll()

catchList.innerHTML=""

list.reverse().forEach(c=>{

catchList.innerHTML+=`

<div class="card">

<b>${c.species}</b>

<br>

${c.length} cm • depth ${c.depth}m

<br>

📍 ${c.coords}

<br>

${c.bait? "Bait: "+c.bait:""}

<br>

${c.date}

</div>

`

})

}

let map
let satLayer
let osmLayer
let satOn=false

function initMap(){

if(map)return

map=L.map("map").setView([-34.37,20.85],9)

osmLayer=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map)

satLayer=L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
)

}

function toggleSatellite(){

satOn=!satOn

if(satOn){
map.removeLayer(osmLayer)
satLayer.addTo(map)
}else{
map.removeLayer(satLayer)
osmLayer.addTo(map)
}

}

showTab("add")

</script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./sw.js")
}
</script>

</body>
</html>
