<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tanya Sea App V3</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1320">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body{
background:#0b1320;
color:white;
font-family:Arial;
margin:0;
padding:20px
}

.card{
background:#101b2d;
padding:15px;
border-radius:12px;
margin-bottom:15px
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#2d6cdf;
color:white;
margin-top:5px;
width:100%
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:none
}

#map{
height:400px;
border-radius:10px
}

.photo{
width:100%;
border-radius:10px;
margin-top:10px
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px
}
</style>
</head>

<body>

<h2>🎣 Tanya Sea App</h2>

<div class="card">

<label>Species</label>
<select id="species">
<option>Kaapse Kabeljou</option>
<option>Geelstert</option>
<option>Bonnie</option>
<option>Rooi Roman</option>
<option>Snapper</option>
<option>Galjoen</option>
<option>Hottentot</option>
<option>Elf</option>
<option>Leervis</option>
</select>

<label>Place</label>
<input id="place">

<label>Length cm</label>
<input id="length" type="number">

<label>Coordinates</label>
<input id="coords">

<button onclick="getGPS()">📍 Get GPS</button>
<button onclick="openMaps()">🗺 Open Google Maps</button>
<button onclick="saveSpot()">⭐ Save Spot</button>

<label>Photo</label>

<button onclick="document.getElementById('photoCamera').click()">📷 Camera</button>
<button onclick="document.getElementById('photoGallery').click()">🖼 Gallery</button>

<input id="photoCamera" type="file" accept="image/*" capture="environment" style="display:none">
<input id="photoGallery" type="file" accept="image/*" style="display:none">

<div id="preview"></div>

<label>Notes</label>
<input id="notes">

<button onclick="saveCatch()">💾 Save Catch</button>

</div>

<div class="card">
<h3>📒 Log</h3>
<button onclick="showStats()">📊 Species Stats</button>
<div id="log"></div>
</div>

<div class="card">
<h3>🗺 Map</h3>
<button onclick="renderMap()">Show Map</button>
<div id="map"></div>
</div>

<div class="card">
<h3>🖼 Gallery</h3>
<div id="gallery" class="gallery"></div>
</div>

<script>

const KEY="tanyaSeaApp"

function getAll(){
return JSON.parse(localStorage.getItem(KEY)||"[]")
}

function saveAll(data){
localStorage.setItem(KEY,JSON.stringify(data))
}

function getMoonPhase(date = new Date()){
const lp = 2551443
const new_moon = new Date(1970,0,7,20,35,0)

const phase = ((date.getTime() - new_moon.getTime())/1000) % lp
const moon = Math.floor(phase / (24*3600)) + 1

if(moon < 2) return "New Moon"
if(moon < 7) return "Waxing"
if(moon < 9) return "First Quarter"
if(moon < 15) return "Waxing Gibbous"
if(moon < 17) return "Full Moon"
if(moon < 22) return "Waning"
if(moon < 24) return "Last Quarter"
return "Waning Crescent"
}

function getTideType(moon){
if(moon==="New Moon" || moon==="Full Moon") return "Spring Tide"
if(moon==="First Quarter" || moon==="Last Quarter") return "Neap Tide"
return "Normal Tide"
}

function getGPS(){

if(!navigator.geolocation){
alert("GPS not supported")
return
}

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude
let lon=pos.coords.longitude

document.getElementById("coords").value=lat+","+lon

})

}

function openMaps(){

let c=document.getElementById("coords").value
if(!c)return

window.open("https://www.google.com/maps?q="+c)

}

let photo=""

document.getElementById("photoCamera").onchange=e=>{
let file=e.target.files[0]

let r=new FileReader()

r.onload=function(){
photo=r.result
document.getElementById("preview").innerHTML='<img src="'+photo+'" class="photo">'
}

r.readAsDataURL(file)
}

document.getElementById("photoGallery").onchange=e=>{
let file=e.target.files[0]

let r=new FileReader()

r.onload=function(){
photo=r.result
document.getElementById("preview").innerHTML='<img src="'+photo+'" class="photo">'
}

r.readAsDataURL(file)
}

function saveCatch(){

let species=document.getElementById("species").value
let place=document.getElementById("place").value
let length=document.getElementById("length").value
let coords=document.getElementById("coords").value
let notes=document.getElementById("notes").value

let moon=getMoonPhase()
let tide=getTideType(moon)

let data=getAll()

data.unshift({
id:Date.now(),
species,
place,
length,
coords,
notes,
photo,
moon,
tide
})

saveAll(data)

document.getElementById("place").value=""
document.getElementById("length").value=""
document.getElementById("coords").value=""
document.getElementById("notes").value=""
document.getElementById("preview").innerHTML=""

photo=""

renderLog()
renderGallery()

}

function renderLog(){

let list=document.getElementById("log")

list.innerHTML=""

let data=getAll()

data.forEach(c=>{

let html='<div class="card">'

html+='<b>'+c.species+'</b><br>'
html+=c.place+" "+c.length+"cm<br>"

html+="🌙 "+c.moon+"<br>"
html+="🌊 "+c.tide+"<br>"

if(c.photo){
html+='<img src="'+c.photo+'" class="photo">'
}

html+='<button onclick="openLogMap('+c.id+')">Maps</button>'
html+='<button onclick="deleteCatch('+c.id+')">Delete</button>'

html+='</div>'

list.innerHTML+=html

})

}

function deleteCatch(id){

let data=getAll().filter(c=>c.id!=id)

saveAll(data)

renderLog()
renderGallery()

}

function openLogMap(id){

let c=getAll().find(x=>x.id==id)

if(c && c.coords){
window.open("https://www.google.com/maps?q="+c.coords)
}

}

function renderGallery(){

let g=document.getElementById("gallery")

g.innerHTML=""

let data=getAll().filter(x=>x.photo)

data.forEach(c=>{
g.innerHTML+='<img src="'+c.photo+'" class="photo">'
})

}

function saveSpot(){

let coords=document.getElementById("coords").value

let name=prompt("Spot name")

if(!coords || !name)return

let spots=JSON.parse(localStorage.getItem("spots")||"[]")

spots.push({
name,
coords
})

localStorage.setItem("spots",JSON.stringify(spots))

alert("Spot saved ⭐")

}

function showStats(){

let data=getAll()

let stats={}

data.forEach(c=>{
if(!stats[c.species]) stats[c.species]=0
stats[c.species]++
})

let txt=""

for(let s in stats){
txt+=s+" : "+stats[s]+"\n"
}

alert(txt)

}

let map

function renderMap(){

let data=getAll()

if(!map){

map=L.map('map').setView([-34.37,21.42],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}

let heatPoints=[]

data.forEach(c=>{

if(!c.coords)return

let p=c.coords.split(",")

L.marker([p[0],p[1]]).addTo(map)

heatPoints.push([p[0],p[1],0.5])

})

L.heatLayer(heatPoints).addTo(map)

}

renderLog()
renderGallery()

</script>

</body>
</html>
