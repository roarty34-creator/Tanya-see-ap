<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Deep Sea Fishing App</title>

<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#061225">

<style>
body{
background:#061225;
color:#fff;
font-family:Arial;
margin:0;
padding:20px;
}

button{
background:#2fa4ff;
border:none;
padding:10px 14px;
border-radius:10px;
margin:5px;
color:#001420;
font-size:14px;
}

.card{
background:#0f1c38;
padding:15px;
border-radius:15px;
margin-top:15px;
}

input,select{
width:100%;
padding:10px;
background:#081632;
color:#fff;
border:none;
border-radius:10px;
margin-top:5px;
}

.mini{
font-size:12px;
color:#9fb0d0;
}

</style>
</head>

<body>

<h1>Tanya Deep Sea Fishing App</h1>

<div>
<button onclick="showTab('add')">Add Catch</button>
<button onclick="showTab('spots')">Spots & Navigate</button>
<button onclick="showTab('drift')">Drift</button>
<button onclick="showTab('log')">Log</button>
<button onclick="showTab('stats')">Stats</button>
<button onclick="showTab('guide')">Boat Guide</button>
</div>

<section id="add">

<div class="card">

<h2>Add Catch</h2>

<label>Species</label>
<select id="species">
<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Silverfish</option>
<option>Red Steenbras</option>
<option>Yellow Belly</option>
<option>Hottentot</option>
</select>

<label>Bait Used</label>
<select id="bait">
<option>Pilchard</option>
<option>Makriel</option>
<option>Chokka</option>
<option>Chokka + Pilchard</option>
<option>Squid</option>
</select>

<label>Local Area</label>
<input id="localArea">

<label>Coordinates</label>
<input id="coords">

<button onclick="getGPS()">Get GPS</button>

<label>Where Caught</label>
<input id="whereCaught" value="Deep Sea">

<button onclick="saveCatch()">Save Catch</button>

</div>

</section>

<section id="spots" style="display:none">

<div class="card">

<h2>Spots & Navigate</h2>

<select id="nextSpot">
<option value="">Choose next spot</option>
</select>

<button onclick="startNavigation()">Start Navigation</button>

<div id="navResult"></div>

</div>

</section>

<section id="log" style="display:none">
<div class="card">
<h2>Catch Log</h2>
<div id="logBox"></div>
</div>
</section>

<div style="text-align:center;margin-top:20px;font-size:11px;color:#9fb0d0;">
Tanya Deep Sea Fishing App<br>
Core system: V69<br>
Cache system: V71-style<br>
Build version: V74 Stable
</div>

<script>

function showTab(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

function getGPS(){
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude
const lon=pos.coords.longitude
document.getElementById("coords").value=lat+","+lon
})
}

function saveCatch(){

const species=document.getElementById("species").value
const bait=document.getElementById("bait").value
const coords=document.getElementById("coords").value

let log=JSON.parse(localStorage.getItem("catchlog")||"[]")

log.push({
species:species,
bait:bait,
coords:coords,
date:new Date().toLocaleString()
})

localStorage.setItem("catchlog",JSON.stringify(log))

renderLog()

}

function renderLog(){

let log=JSON.parse(localStorage.getItem("catchlog")||"[]")

let html=""

log.forEach(c=>{
html+=`
<div class="card">
<b>${c.species}</b><br>
Bait: ${c.bait}<br>
Coords: ${c.coords}<br>
${c.date}
</div>
`
})

document.getElementById("logBox").innerHTML=html

}

renderLog()

</script>

</body>
</html>
