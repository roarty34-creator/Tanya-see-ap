<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tanya Sea App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
padding:15px;
}

.card{
background:#121a30;
padding:15px;
margin-bottom:12px;
border-radius:12px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:bold;
margin:4px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

#map{
height:400px;
border-radius:10px;
}

.nav button{
background:#1f2a44;
}

</style>
</head>

<body>

<h2>🎣 Tanya Sea App V11</h2>

<div class="nav">

<button onclick="showTab('add')">Add</button>
<button onclick="showTab('log')">Log</button>
<button onclick="showTab('map')">Map</button>
<button onclick="showTab('sea')">Sea</button>
<button onclick="showTab('stats')">Stats</button>

</div>

<!-- ADD -->

<div id="add" class="card">

<h3>Add Catch</h3>

<select id="species">
<option value="">Species</option>
<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Galjoen</option>
<option>Hottentot</option>
<option>Steenbras</option>
<option>Elf</option>
<option>Garrick</option>
<option>Shark</option>
</select>

<input id="place" placeholder="Place">

<button onclick="getGPS()">📍 Get GPS</button>

<input id="coords" placeholder="Coordinates">

<input id="length" placeholder="Length cm">

<textarea id="notes" placeholder="Notes"></textarea>

<input type="file" id="photo">

<button onclick="saveCatch()">Save</button>

</div>

<!-- LOG -->

<div id="log" class="card" style="display:none">

<h3>Catch Log</h3>

<div id="logList"></div>

</div>

<!-- MAP -->

<div id="mapTab" class="card" style="display:none">

<h3>Fishing Map</h3>

<div id="map"></div>

</div>

<!-- SEA -->

<div id="sea" class="card" style="display:none">

<h3>Sea Forecast</h3>

<button onclick="fetchSea()">Refresh</button>

<div id="seaList"></div>

</div>

<!-- STATS -->

<div id="stats" class="card" style="display:none">

<h3>Species Stats</h3>

<div id="statsBox"></div>

</div>

<script>

let catches = JSON.parse(localStorage.getItem("catches") || "[]")

function showTab(id){

document.getElementById("add").style.display="none"
document.getElementById("log").style.display="none"
document.getElementById("mapTab").style.display="none"
document.getElementById("sea").style.display="none"
document.getElementById("stats").style.display="none"

document.getElementById(id).style.display="block"

if(id==="log") renderLog()
if(id==="map") renderMap()
if(id==="stats") renderStats()

}

function getGPS(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude
let lon=pos.coords.longitude

document.getElementById("coords").value=lat+","+lon

})

}

function saveCatch(){

let species=document.getElementById("species").value
let place=document.getElementById("place").value
let coords=document.getElementById("coords").value
let length=document.getElementById("length").value
let notes=document.getElementById("notes").value

let photoInput=document.getElementById("photo")

let photo=""

if(photoInput.files[0]){

let reader=new FileReader()

reader.onload=function(e){

photo=e.target.result

finishSave()

}

reader.readAsDataURL(photoInput.files[0])

}else{

finishSave()

}

function finishSave(){

let moon=getMoon()

catches.push({

species,
place,
coords,
length,
notes,
photo,
moon,
date:new Date().toLocaleDateString()

})

localStorage.setItem("catches",JSON.stringify(catches))

alert("Saved")

}

}

function renderLog(){

let html=""

catches.forEach(c=>{

html+=`

<div class="card">

<b>${c.species}</b><br>

${c.place}<br>

${c.length} cm<br>

🌙 ${c.moon}<br>

${c.date}

${c.photo?`<img src="${c.photo}" width="100%">`:""}

</div>

`

})

document.getElementById("logList").innerHTML=html

}

function renderStats(){

let stats={}

catches.forEach(c=>{

stats[c.species]=(stats[c.species]||0)+1

})

let html=""

for(let s in stats){

html+=`${s}: ${stats[s]}<br>`

}

document.getElementById("statsBox").innerHTML=html

}

function getMoon(){

let lp=2551443

let new_moon=new Date(1970,0,7,20,35,0)

let phase=((Date.now()-new_moon)/1000)%lp

let day=Math.floor(phase/(24*3600))

if(day<2)return"New"
if(day<7)return"Waxing"
if(day<9)return"Quarter"
if(day<15)return"Gibbous"
if(day<17)return"Full"
return"Waning"

}

function fetchSea(){

fetch("https://marine-api.open-meteo.com/v1/marine?latitude=-34.37&longitude=20.85&hourly=wave_height")

.then(r=>r.json())

.then(data=>{

let waves=data.hourly.wave_height

let html=""

waves.slice(0,24).forEach((w,i)=>{

html+=`Hour ${i}: ${w} m<br>`

})

document.getElementById("seaList").innerHTML=html

})

}

let map

function renderMap(){

if(!map){

map=L.map("map").setView([-34.37,20.85],11)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

}

catches.forEach(c=>{

if(c.coords){

let p=c.coords.split(",")

L.marker([p[0],p[1]]).addTo(map)

}

})

}

</script>

</body>
</html>
