<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tanya Sea App V18</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root{
      --bg:#0b1220; --card:#101a2e; --text:#e8eefc; --muted:#9fb0d0;
      --accent:#4f8cff; --border:#20304d; --good:#1dd1a1; --warn:#feca57; --bad:#ff6b6b;
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:16px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% 0%, #142040 0%, var(--bg) 55%);
      color:var(--text);
    }
    h2{margin:0 0 10px}
    .topnav{
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      background:#0e1730; padding:8px; border-radius:999px; border:1px solid var(--border);
      margin-bottom:14px;
    }
    .navbtn{
      border:none; background:transparent; cursor:pointer;
      padding:10px 14px; border-radius:999px; font-weight:1000; color:var(--text);
    }
    .navbtn.active{ background:var(--accent); color:#071022; }
    button{
      background:transparent; color:var(--text); border:1px solid var(--border);
      padding:10px 14px; border-radius:999px; cursor:pointer; font-weight:900;
    }
    button:hover{ border-color: var(--accent); }
    button:active{ transform: scale(0.98); }
    .danger{border-color:rgba(255,107,107,.55); color:var(--bad)}
    .card{
      background: linear-gradient(180deg, #122042 0%, var(--card) 100%);
      border:1px solid var(--border); border-radius:18px; padding:14px; margin:10px 0;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
    }
    .mini{font-size:12px; color:var(--muted)}
    label.small{
      display:block; margin:10px 0 6px; color:var(--muted);
      font-size:12px; font-weight
      font-weight:900;
color:var(--muted);
letter-spacing:.2px;
margin-top:6px;
}

.card{
background:linear-gradient(180deg,#122042 0%,#0f1a30 100%);
border:1px solid #22345a;
border-radius:16px;
padding:14px;
margin-top:10px;
}

button{
background:#1f3b73;
border:none;
color:white;
padding:10px 14px;
border-radius:10px;
font-weight:800;
cursor:pointer;
}

button:hover{
background:#2a4f99;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #20345f;
background:#0e1730;
color:white;
margin-top:6px;
}

#map{
height:350px;
border-radius:14px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Tanya Sea App</h2>

<div class="card">

<label class="small">Species</label>

<select id="species">
<option value="">Choose species...</option>
<option>Dusky Kob (Kabeljou)</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Silver</option>
<option>Galjoen</option>
<option>Hottentot</option>
</select>

<label class="small">Place</label>
<input id="place" placeholder="Fishing spot">

<label class="small">Length (cm)</label>
<input id="length">

<label class="small">Coordinates</label>

<div style="display:flex;gap:8px;">
<button onclick="getGPS()">📍 Get GPS</button>
<input id="coords" placeholder="-34.37,20.85">
</div>

<label class="small">Wind direction</label>
<input id="windDir">

<label class="small">Water temp °C</label>
<input id="waterTemp">

<label class="small">Photo</label>

<input type="file" accept="image/*" capture="environment" onchange="loadPhoto(event)">

<div id="photoPreview"></div>

<br>

<button onclick="saveCatch()">Save Catch</button>

</div>


<div id="list"></div>


<script>

const KEY="tanya-sea-v18"

function getAll(){
return JSON.parse(localStorage.getItem(KEY)||"[]")
}

function saveAll(d){
localStorage.setItem(KEY,JSON.stringify(d))
}

function loadPhoto(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(){
document.getElementById("photoPreview").innerHTML=
`<img src="${reader.result}" style="width:100%;border-radius:10px">`
}

reader.readAsDataURL(file)

}


function saveCatch(){

const data=getAll()

data.push({
species:species.value,
place:place.value,
length:length.value,
coords:coords.value,
wind:windDir.value,
temp:waterTemp.value,
date:new Date().toLocaleDateString()
})

saveAll(data)

renderLog()

}


function renderLog(){

const data=getAll()

const box=document.getElementById("list")

box.innerHTML=""

data.reverse().forEach(c=>{

box.innerHTML+=`

<div class="card">

<b>${c.species}</b><br>

${c.place} • ${c.length}cm<br>

${c.date}

<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">

<button onclick="openMaps('${c.coords}')">🧭 Maps</button>

<button onclick="navigate('${c.coords}')">➡️ Directions</button>

<button onclick="identifyFish('${c.species}')">🐟 Identify</button>

</div>

</div>

`

})

}



function openMaps(coords){

window.open(
`https://www.google.com/maps?q=${coords}`,
"_blank"
)

}


function navigate(coords){

window.open(
`https://www.google.com/maps/dir/?api=1&destination=${coords}`,
"_blank"
)

}


function identifyFish(name){

window.open(
`https://www.google.com/search?q=${encodeURIComponent(name+" fish")}`,
"_blank"
)

}



function getGPS(){

navigator.geolocation.getCurrentPosition(async pos=>{

const lat=pos.coords.latitude
const lon=pos.coords.longitude

coords.value=lat+","+lon


try{

const weather=
await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)

const j=await weather.json()

const dir=j.current_weather.winddirection

windDir.value=degToCompass(dir)

}catch(e){}


try{

const marine=
await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=sea_surface_temperature`)

const m=await marine.json()

waterTemp.value=m.hourly.sea_surface_temperature[0].toFixed(1)

}catch(e){}


})

}


function degToCompass(d){

const dirs=["N","NE","E","SE","S","SW","W","NW"]

return dirs[Math.round(d/45)%8]

}


renderLog()

</script>

</body>
</html>
