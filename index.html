<!DOCTYPE html>
<html lang="af">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tanya Sea App</title>

<link rel="manifest" href="manifest.webmanifest">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
background:#0b1220;
color:white;
font-family:Arial;
padding:15px;
margin:0;
}

.card{
background:#111c32;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

button{
padding:10px;
border-radius:10px;
border:none;
background:#2e6cff;
color:white;
margin-top:6px;
width:100%;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #333;
background:#0f1730;
color:white;
}

.row{
display:flex;
gap:10px;
}

.row>*{
flex:1;
}

.chip{
display:inline-block;
background:#0f1730;
padding:6px 10px;
border-radius:20px;
margin:3px;
}

.photo{
width:100%;
border-radius:10px;
margin-top:8px;
}

#map{
height:380px;
border-radius:12px;
}

</style>

</head>

<body>

<h2>🎣 Tanya Sea App</h2>

<div class="card">

<div class="row">
<button onclick="showTab('add')">Add</button>
<button onclick="showTab('log')">Log</button>
<button onclick="showTab('map')">Map</button>
<button onclick="showTab('stats')">Stats</button>
<button onclick="showTab('sea')">Sea</button>
</div>

</div>

<section id="add">

<div class="card">

<label>Spesie</label>

<select id="species">
<option>Kaapse Kabeljou</option>
<option>Geelstert</option>
<option>Bonnie</option>
<option>Rooi Roman</option>
<option>Snapper</option>
<option>Silver</option>
<option>Rooi Steenbras</option>
<option>Yellow Belly</option>
<option>Galjoen</option>
<option>Hottentot</option>
<option>Elf</option>
</select>

<label>Plek</label>
<input id="place">

<label>Lengte (cm)</label>
<input id="length" type="number">

<label>Koördinate</label>

<div class="row">
<button onclick="getGPS()">📍 GPS</button>
<input id="coords" readonly>
</div>

<label>Foto</label>
<input type="file" id="photo" accept="image/*">

<div id="preview"></div>

<label>Notas</label>
<textarea id="notes"></textarea>

<button onclick="saveCatch()">Save Catch</button>

</div>

</section>

<section id="log"></section>

<section id="mapSection">

<div class="card">
<div id="map"></div>
</div>

</section>

<section id="stats">

<div class="card">

<div id="statsBox"></div>

</div>

</section>

<section id="sea">

<div class="card">

<button onclick="fetchSea()">Refresh Sea Forecast</button>

<div id="seaBox"></div>

</div>

</section>

<script>

const KEY="tanya-sea-app"

function getAll(){

return JSON.parse(localStorage.getItem(KEY)||"[]")

}

function saveAll(d){

localStorage.setItem(KEY,JSON.stringify(d))

}

function showTab(id){

["add","log","mapSection","stats","sea"].forEach(s=>{
document.getElementById(s).style.display="none"
})

if(id=="map")id="mapSection"

document.getElementById(id).style.display="block"

if(id=="log")renderLog()
if(id=="mapSection")renderMap()
if(id=="stats")renderStats()

}

function getGPS(){

navigator.geolocation.getCurrentPosition(

p=>{

let lat=p.coords.latitude
let lon=p.coords.longitude

document.getElementById("coords").value=lat+","+lon

},

e=>{

alert("GPS kon nie kry nie")

})

}

function getMoonPhase(){

let lp=2551443
let now=new Date()
let new_moon=new Date(1970,0,7,20,35,0)

let phase=((now-new_moon)/1000)%lp

let day=Math.floor(phase/(24*3600))+1

if(day<2)return"New"
if(day<7)return"Waxing"
if(day<9)return"Quarter"
if(day<15)return"Gibbous"
if(day<17)return"Full"
if(day<22)return"Waning"
return"Crescent"

}

function saveCatch(){

let data=getAll()

let photo=""

let file=document.getElementById("photo").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(){

photo=reader.result

add()

}

reader.readAsDataURL(file)

}else{

add()

}

function add(){

let obj={

id:Date.now(),

species:species.value,

place:place.value,

length:length.value,

coords:coords.value,

notes:notes.value,

moon:getMoonPhase(),

photo:photo,

date:new Date().toLocaleDateString()

}

data.unshift(obj)

saveAll(data)

renderLog()

}

}

function renderLog(){

let data=getAll()

let html=""

data.forEach(c=>{

html+=`

<div class="card">

<b>${c.species}</b><br>

${c.place} • ${c.length}cm • ${c.date}

<div>

<span class="chip">🌙 ${c.moon}</span>

</div>

${c.photo?`<img src="${c.photo}" class="photo">`:""}

<div class="row">

<button onclick="openMap('${c.coords}')">Maps</button>

<button onclick="deleteCatch('${c.id}')">Delete</button>

</div>

</div>

`

})

document.getElementById("log").innerHTML=html

}

function deleteCatch(id){

let data=getAll().filter(c=>c.id!=id)

saveAll(data)

renderLog()

}

function openMap(coords){

window.open("https://maps.google.com/?q="+coords)

}

let map

let markers=[]

let heat

function renderMap(){

let data=getAll()

if(!map){

map=L.map('map').setView([-34.37,20.85],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

}

markers.forEach(m=>map.removeLayer(m))

markers=[]

let heatPoints=[]

data.forEach(c=>{

if(!c.coords)return

let parts=c.coords.split(",")

let lat=parseFloat(parts[0])

let lon=parseFloat(parts[1])

let m=L.marker([lat,lon]).addTo(map)

markers.push(m)

heatPoints.push([lat,lon,0.5])

})

if(heat)map.removeLayer(heat)

heat=L.heatLayer(heatPoints,{radius:25}).addTo(map)

}

function renderStats(){

let data=getAll()

let species={}

data.forEach(c=>{

species[c.species]=(species[c.species]||0)+1

})

let html=""

Object.keys(species).forEach(s=>{

html+=`${s}: ${species[s]}<br>`

})

document.getElementById("statsBox").innerHTML=html

}

async function fetchSea(){

seaBox.innerHTML="Loading..."

let url=`https://marine-api.open-meteo.com/v1/marine?latitude=-34.37&longitude=20.85&hourly=wave_height,sea_surface_temperature&forecast_days=14&timezone=auto`

let res=await fetch(url)

let data=await res.json()

let time=data.hourly.time

let wave=data.hourly.wave_height

let temp=data.hourly.sea_surface_temperature

let days={}

for(let i=0;i<time.length;i++){

let day=time[i].slice(0,10)

if(!days[day])days[day]={wave:[],temp:[]}

days[day].wave.push(wave[i])

days[day].temp.push(temp[i])

}

let html=""

Object.keys(days).forEach(d=>{

let w=Math.max(...days[d].wave)

let t=(days[d].temp.reduce((a,b)=>a+b,0)/days[d].temp.length).toFixed(1)

html+=`

<div class="card">

${d}<br>

🌊 Wave: ${w} m<br>

🌡 Sea: ${t}°C

</div>

`

})

seaBox.innerHTML=html

}

showTab("add")

</script>

</body>
  </html>
