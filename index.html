<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Fishing ULTRA PRO</title>

<link rel="manifest" href="manifest.webmanifest">

<style>
body{margin:0;font-family:Arial;background:#061225;color:white;}
header{padding:15px;text-align:center;background:#081632;font-size:20px;font-weight:bold;}
.section{padding:15px;}
.card{background:#0f1c38;padding:12px;margin-bottom:10px;border-radius:10px;}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none;}
button{padding:10px;background:#2fa4ff;border:none;border-radius:8px;color:white;margin-top:5px;}
.ok{color:#39d98a;} .danger{color:red;} .warn{color:orange;}
#map{height:250px;border-radius:10px;}
</style>

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<header>🎣 Tanya Fishing ULTRA PRO</header>

<div class="section">

<!-- 🌊 SEA -->
<div class="card">
<h3>🌊 Sea + Wind</h3>
<div id="sea">Loading...</div>
</div>

<!-- 📍 MAP -->
<div class="card">
<h3>📍 Fishing Map</h3>
<div id="map"></div>
</div>

<!-- 🐟 FISH -->
<div class="card">
<h3>🐟 Fish</h3>
<select id="fishName"></select>
<input id="fishSize" placeholder="Size cm">
<input id="fishCount" placeholder="Count">
<button onclick="checkFish()">Check</button>
<div id="result"></div>
</div>

<!-- 🧠 BAIT AI -->
<div class="card">
<h3>🧠 Bait Predictor</h3>
<select id="baitFish"></select>
<button onclick="predictBait()">Predict</button>
<div id="baitResult"></div>
</div>

<!-- 📊 CATCH -->
<div class="card">
<h3>📊 Catch Log</h3>
<select id="catchFish"></select>
<input id="catchSize" placeholder="Size">
<button onclick="saveCatch()">Save</button>
<div id="log"></div>
<div id="stats"></div>
</div>

</div>

<script>

// 🌊 SEA + WIND
fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.37&longitude=21.42&current=wind_speed_10m")
.then(r=>r.json())
.then(d=>{
  document.getElementById("sea").innerHTML=
  "Wind: "+d.current.wind_speed_10m+" km/h";
});

// 🐟 BIG DATABASE
const fish=[
{name:"Kabeljou",size:60,bag:5},
{name:"Yellowtail",size:60,bag:10},
{name:"Red Roman",size:30,bag:5},
{name:"Hottentot",size:22,bag:10},
{name:"Geelbek",size:60,bag:5},
{name:"Elf",size:30,bag:4},
{name:"Santer",size:30,bag:10},
{name:"Carpenter",size:40,bag:5},
{name:"Dageraad",size:40,bag:1},
{name:"Steenbras",size:60,bag:1},
{name:"Galjoen",size:35,bag:2},
{name:"Leervis",size:70,bag:2}
];

// dropdowns
fish.forEach(f=>{
  fishName.innerHTML+=`<option>${f.name}</option>`;
  catchFish.innerHTML+=`<option>${f.name}</option>`;
  baitFish.innerHTML+=`<option>${f.name}</option>`;
});

// ⚖️ CHECK
function checkFish(){
  let f=fish.find(x=>x.name==fishName.value);
  let size=fishSize.value;
  let count=fishCount.value;

  let msg="";
  msg += size>=f.size ? "<div class='ok'>Size OK</div>" : "<div class='danger'>Too small</div>";
  msg += count>f.bag ? "<div class='danger'>Over bag</div>" : "<div class='ok'>Bag OK</div>";

  result.innerHTML=msg;
}

// 🧠 BAIT AI
function predictBait(){
  let f=baitFish.value;

  let bait="Chokka + Sardine";

  if(f=="Yellowtail") bait="Live bait / spoon";
  if(f=="Galjoen") bait="Red bait";
  if(f=="Leervis") bait="Live mullet";

  baitResult.innerHTML="Best bait: "+bait;
}

// 📊 CATCH
function saveCatch(){
  let list=JSON.parse(localStorage.getItem("catch")||"[]");
  list.push({fish:catchFish.value,size:catchSize.value});
  localStorage.setItem("catch",JSON.stringify(list));
  loadCatch();
}

function loadCatch(){
  let list=JSON.parse(localStorage.getItem("catch")||"[]");
  log.innerHTML=list.map(c=>c.fish+" "+c.size+"cm").join("<br>");

  // stats
  let count={};
  list.forEach(c=>count[c.fish]=(count[c.fish]||0)+1);
  let top=Object.keys(count).sort((a,b)=>count[b]-count[a])[0];

  stats.innerHTML="Top fish: "+(top||"-");
}
loadCatch();

// 📍 MAP
let map=L.map('map').setView([-34.37,21.42], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('click', function(e){
  let coords=e.latlng;
  L.marker(coords).addTo(map);

  let list=JSON.parse(localStorage.getItem("spots")||"[]");
  list.push(coords.lat+","+coords.lng);
  localStorage.setItem("spots",JSON.stringify(list));
});

</script>

</body>
</html>
