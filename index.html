<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tanya Sea App</title>

<style>
body{
  font-family:Arial;
  background:#0b1320;
  color:white;
  margin:0;
  padding:20px;
}

.card{
  background:#101b2d;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:14px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2d6cdf;
  color:white;
  font-weight:bold;
  margin-right:6px;
}

.log{
  background:#18243b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>🎣 Tanya Sea App</h2>

<div class="card">

<label>Species</label>
<select id="species">
<option>Kaapse Kabeljou</option>
<option>Geelstert</option>
<option>Bonito</option>
<option>Elf</option>
<option>Galjoen</option>
<option>Steenbras</option>
<option>Raggy</option>
<option>Bronze Whaler</option>
</select>

<label>Plek</label>
<input id="place" placeholder="Stilbaai harbour">

<label>Lengte (cm)</label>
<input id="length" type="number">

<label>GPS coords</label>
<input id="coords" placeholder="-34.37,21.42">

<button type="button" onclick="getGPS()">📍 Get GPS</button>
<button type="button" onclick="openMaps()">🗺 Open Google Maps</button>

<br><br>

<button type="button" onclick="saveCatch()">💾 Save Catch</button>

</div>

<div class="card">
<h3>📒 Log</h3>
<div id="log"></div>
</div>

<script>

const KEY="tanya_catches"

function getData(){
  return JSON.parse(localStorage.getItem(KEY)||"[]")
}

function saveData(d){
  localStorage.setItem(KEY,JSON.stringify(d))
}

function getGPS(){

  if(!navigator.geolocation){
    alert("GPS nie beskikbaar nie")
    return
  }

  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude
      const lng=pos.coords.longitude

      document.getElementById("coords").value=
      lat.toFixed(6)+","+lng.toFixed(6)

      alert("GPS OK")
    },

    err=>{
      alert("GPS error: "+err.message)
    },

    {enableHighAccuracy:true,timeout:15000}
  )
}

function openMaps(){

  const coords=document.getElementById("coords").value

  if(!coords.includes(",")){
    alert("Geen coords")
    return
  }

  window.open(
  "https://www.google.com/maps?q="+coords,
  "_blank")
}

function saveCatch(){

  const species=document.getElementById("species").value
  const place=document.getElementById("place").value
  const length=document.getElementById("length").value
  const coords=document.getElementById("coords").value

  const data=getData()

  data.unshift({
    species,
    place,
    length,
    coords,
    date:new Date().toLocaleString()
  })

  saveData(data)

  renderLog()

  alert("Saved")
}

function renderLog(){

  const log=document.getElementById("log")

  const data=getData()

  log.innerHTML=""

  data.forEach(c=>{

    log.innerHTML+=`
    <div class="log">
    <b>${c.species}</b><br>
    ${c.place}<br>
    ${c.length} cm<br>
    ${c.coords}<br>
    <small>${c.date}</small>
    </div>
    `
  })
}

renderLog()

  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").then((reg) => {
    reg.update();
  });
}
  </script>

</body>
</html>
