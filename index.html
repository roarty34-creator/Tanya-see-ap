<!DOCTYPE html>
<html lang="af">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FishLog</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0b1320" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root{
      --bg:#0b1320;
      --card:#111a2b;
      --card2:#0f1726;
      --text:#e9eefc;
      --muted:#aab7d6;
      --btn:#2d6cdf;
      --btn2:#244fa3;
      --danger:#e25555;
      --ok:#32d583;
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:16px;
    }
    h1,h2,h3{margin:0 0 10px 0}
    .title{
      font-size:34px;
      font-weight:800;
      text-align:center;
      letter-spacing:0.4px;
      margin:12px 0 14px;
    }
    .nav{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    button{
      border:none;
      background:var(--btn);
      color:white;
      padding:12px 16px;
      border-radius:14px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }
    button:active{transform:scale(0.98)}
    .secondary{background:var(--btn2)}
    .danger{background:var(--danger)}
    .smallBtn{
      padding:8px 10px;
      font-size:13px;
      border-radius:12px;
      font-weight:700;
    }
    .card{
      background:linear-gradient(180deg, var(--card), var(--card2));
      border-radius:var(--radius);
      padding:16px;
      max-width:520px;
      margin:0 auto 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }
    label{display:block; font-size:13px; color:var(--muted); margin:10px 0 6px}
    input, select, textarea{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      outline:none;
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-size:16px;
    }
    textarea{min-height:76px; resize:vertical}
    .row{display:flex; gap:10px}
    .row > div{flex:1}
    .hint{color:var(--muted); font-size:13px; margin-top:8px}
    .chipRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    .chip{
      background:rgba(255,255,255,.08);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.08);
    }
    .entry{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:12px;
      margin-top:10px;
    }
    .entryTitle{font-weight:800; font-size:16px; margin-bottom:6px}
    .entryMeta{color:var(--muted); font-size:13px}
    .entry img{
      width:100%;
      border-radius:14px;
      margin-top:10px;
      border:1px solid rgba(255,255,255,.08);
    }
    #map{
      height:420px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      overflow:hidden;
      margin-top:10px;
    }
    .hidden{display:none}
    .footerBtns{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
    .okText{color:var(--ok); font-weight:800}
  </style>
</head>

<body>
  <div class="title">FishLog 🎣</div>

  <div class="nav">
    <button type="button" onclick="showView('add')">Add</button>
    <button type="button" onclick="showView('log')">Log</button>
    <button type="button" onclick="showView('map')">Map</button>
    <button type="button" onclick="showView('stats')">Stats</button>
  </div>

  <!-- ADD -->
  <div id="view-add" class="card">
    <h2>Add Catch</h2>

    <label>Species</label>
    <select id="species">
      <option value="">Select species</option>
      <option>Kaapse Kabeljou</option>
      <option>Geelstert</option>
      <option>Bonnie (Bonito)</option>
      <option>Garrick (Leervis)</option>
      <option>Elf (Shad)</option>
      <option>Strepie</option>
      <option>Rooisteenbras</option>
      <option>Wit Steenbras</option>
      <option>Hottentot</option>
      <option>Galjoen</option>
      <option>Roman</option>
      <option>Red Roman</option>
      <option>Santer (Snoek)</option>
      <option>Snoek</option>
      <option>Yellowtail</option>
      <option>Tuna</option>
      <option>Shark</option>
      <option>Hammerhead</option>
      <option>Spotted Gully Shark</option>
      <option>Ray</option>
      <option>Skate</option>
      <option>Squid</option>
      <option>Cracker (Dageraad)</option>
      <option>Kob (Kabeljou)</option>
      <option>Other</option>
    </select>

    <div class="row">
      <div>
        <label>Plek</label>
        <input id="place" placeholder="bv. Stilbaai, Blombos, Die Punt" />
      </div>
      <div>
        <label>Lengte (cm)</label>
        <input id="length" inputmode="numeric" placeholder="bv. 68" />
      </div>
    </div>

    <label>Datum</label>
    <input id="date" type="date" />

    <label>GPS coords</label>
    <input id="coords" placeholder="-34.37, 21.42" />

    <div class="footerBtns">
      <button type="button" class="secondary" onclick="getGPS()">📍 Get GPS</button>
      <button type="button" class="secondary" onclick="fillPlaceFromCoords()">📌 Place from GPS</button>
    </div>

    <label>Foto</label>
    <!-- capture maak kamera oop op meeste Androids -->
    <input id="photo" type="file" accept="image/*" capture="environment" />

    <label>Notes</label>
    <textarea id="notes" placeholder="wind / gety / kunsaas / rig / ens."></textarea>

    <div class="footerBtns">
      <button type="button" onclick="saveCatch()">💾 Save Catch</button>
      <button type="button" class="danger" onclick="wipeAll()">🗑️ Delete ALL</button>
    </div>

    <div class="hint">
      Tip: As GPS nie pop-up wys nie, check Chrome site permissions (Location = Allow).
      En maak seker jy is op: <span class="okText">https://...github.io/...</span>
    </div>
  </div>

  <!-- LOG -->
  <div id="view-log" class="card hidden">
    <h2>Log</h2>
    <div class="footerBtns">
      <button type="button" class="secondary smallBtn" onclick="exportCSV()">⬇️ Export CSV</button>
      <button type="button" class="secondary smallBtn" onclick="showView('add')">➕ Add</button>
    </div>
    <div id="logList"></div>
  </div>

  <!-- MAP -->
  <div id="view-map" class="card hidden">
    <h2>Map</h2>
    <div class="hint">Net catches met coords wys hier.</div>
    <div id="map"></div>
  </div>

  <!-- STATS -->
  <div id="view-stats" class="card hidden">
    <h2>Stats</h2>
    <div id="statsText"></div>
  </div>

<script>
/* =========================
   STORAGE
========================= */
const KEY = "fishlog_catches_v3";

function getAll(){
  try { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
  catch(e){ return []; }
}
function saveAll(arr){
  localStorage.setItem(KEY, JSON.stringify(arr));
}

/* =========================
   VIEWS
========================= */
function showView(name){
  const ids = ["add","log","map","stats"];
  ids.forEach(v => document.getElementById("view-"+v).classList.add("hidden"));
  document.getElementById("view-"+name).classList.remove("hidden");

  if(name === "log") renderLog();
  if(name === "stats") renderStats();
  if(name === "map") setTimeout(renderMap, 120);
}

/* =========================
   DATE DEFAULT
========================= */
function setToday(){
  const el = document.getElementById("date");
  if(!el.value){
    const d = new Date();
    el.value = d.toISOString().slice(0,10);
  }
}

/* =========================
   MOON + "TIDE TYPE" (simple)
   - Dit is nie 'n amptelike tide chart nie
   - Dis 'n handig label: Spring / Neap / Building / Dropping
========================= */
function moonAgeDays(date){
  // simple moon age approximation
  const lp = 2551443; // lunar period in seconds
  const newMoon = new Date(Date.UTC(1970,0,7,20,35,0));
  const phase = ((date.getTime() - newMoon.getTime()) / 1000) % lp;
  return Math.floor(phase / 86400); // days
}
function moonPhaseName(age){
  // 0..29-ish
  if(age < 2) return "New Moon";
  if(age < 7) return "Waxing";
  if(age < 9) return "First Quarter";
  if(age < 15) return "Waxing Gibbous";
  if(age < 17) return "Full Moon";
  if(age < 22) return "Waning";
  if(age < 24) return "Last Quarter";
  return "Waning Crescent";
}
function tideTypeFromMoon(age){
  // Spring naby New & Full, Neap naby Quarters
  const distToNew = Math.min(age, 29 - age);
  const distToFull = Math.abs(age - 15);
  const distToQuarter = Math.min(Math.abs(age - 7), Math.abs(age - 22));

  if(distToNew <= 2 || distToFull <= 2) return "Spring (Sterk)";
  if(distToQuarter <= 2) return "Neap (Dooie water)";
  // tussen-in: bou of sak
  if(age > 2 && age < 7) return "Building (na Spring)";
  if(age > 9 && age < 15) return "Building (na Spring)";
  if(age > 17 && age < 22) return "Dropping (na Neap)";
  return "Dropping (na Neap)";
}

/* =========================
   GPS
========================= */
function getGPS(){
  if(!("geolocation" in navigator)){
    alert("GPS nie beskikbaar op hierdie browser nie.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      document.getElementById("coords").value = lat.toFixed(6) + "," + lng.toFixed(6);
      alert("GPS OK ✅");
    },
    (err) => {
      alert("Kon nie GPS kry nie: " + err.message);
    },
    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    }
  );
}

// lekker extra: maak "Place" autofill met coords (Google Maps link)
function fillPlaceFromCoords(){
  const c = document.getElementById("coords").value.trim();
  if(!c || !c.includes(",")){
    alert("Vul eers GPS coords in.");
    return;
  }
  const url = "https://www.google.com/maps?q=" + encodeURIComponent(c);
  document.getElementById("place").value = document.getElementById("place").value || c;
  alert("Tip: Open Maps met hierdie coords:\n" + url);
}

/* =========================
   PHOTO -> base64
========================= */
function toBase64(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

/* =========================
   SAVE
========================= */
async function saveCatch(){
  const species = document.getElementById("species").value.trim();
  const place = document.getElementById("place").value.trim();
  const length = document.getElementById("length").value.trim();
  const dateStr = document.getElementById("date").value;
  const coords = document.getElementById("coords").value.trim();
  const notes = document.getElementById("notes").value.trim();

  if(!species){
    alert("Kies species.");
    return;
  }
  if(!dateStr){
    alert("Kies datum.");
    return;
  }

  let photo = "";
  const file = document.getElementById("photo").files[0];
  if(file){
    try{ photo = await toBase64(file); }
    catch(e){ photo=""; }
  }

  const d = new Date(dateStr + "T12:00:00");
  const age = moonAgeDays(d);
  const moon = moonPhaseName(age);
  const tide = tideTypeFromMoon(age);

  const item = {
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    species,
    place,
    length,
    date: dateStr,
    coords,
    photo,
    notes,
    moon,
    tide,
    createdAt: Date.now()
  };

  const data = getAll();
  data.unshift(item);
  saveAll(data);

  alert("Saved ✅");
  document.getElementById("length").value = "";
  document.getElementById("coords").value = coords; // hou coords as jy baie entries maak
  document.getElementById("photo").value = "";
  document.getElementById("notes").value = "";

  renderLog();
  renderStats();
}

/* =========================
   LOG RENDER
========================= */
function parseCoords(str){
  if(!str) return null;
  const parts = str.split(",").map(s=>s.trim());
  if(parts.length !== 2) return null;
  const lat = parseFloat(parts[0]);
  const lng = parseFloat(parts[1]);
  if(Number.isNaN(lat) || Number.isNaN(lng)) return null;
  return {lat,lng};
}

function renderLog(){
  const list = document.getElementById("logList");
  const data = getAll();

  if(!data.length){
    list.innerHTML = `<div class="hint">Geen catches nog nie. Gaan Add toe.</div>`;
    return;
  }

  let html = "";
  data.forEach((c, i) => {
    const lenTxt = c.length ? `${c.length}cm` : "";
    const meta = [
      c.date || "",
      c.place || "",
      lenTxt
    ].filter(Boolean).join(" • ");

    const hasCoords = !!parseCoords(c.coords);

    html += `
      <div class="entry">
        <div class="entryTitle">${escapeHtml(c.species)}</div>
        <div class="entryMeta">${escapeHtml(meta)}</div>

        <div class="chipRow">
          <div class="chip">🌙 ${escapeHtml(c.moon || "")}</div>
          <div class="chip">🌊 ${escapeHtml(c.tide || "")}</div>
          ${c.coords ? `<div class="chip">📍 ${escapeHtml(c.coords)}</div>` : ``}
        </div>

        ${c.notes ? `<div class="hint" style="margin-top:10px">${escapeHtml(c.notes)}</div>` : ``}

        ${c.photo ? `<img src="${c.photo}" alt="photo">` : ``}

        <div class="footerBtns">
          ${hasCoords ? `<button type="button" class="smallBtn secondary" onclick="focusOnCatch('${c.id}')">🗺️ View on map</button>` : ``}
          <button type="button" class="smallBtn danger" onclick="deleteCatch('${c.id}')">🗑️ Delete</button>
        </div>
      </div>
    `;
  });

  list.innerHTML = html;
}

function escapeHtml(s){
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function deleteCatch(id){
  if(!confirm("Delete hierdie catch?")) return;
  const data = getAll().filter(x => x.id !== id);
  saveAll(data);
  renderLog();
  renderStats();
  renderMap();
}

function wipeAll(){
  if(!confirm("DELETE ALL?")) return;
  localStorage.removeItem(KEY);
  renderLog();
  renderStats();
  renderMap();
  alert("Alles uitgevee ✅");
}

/* =========================
   STATS
========================= */
function renderStats(){
  const box = document.getElementById("statsText");
  const data = getAll();

  if(!data.length){
    box.innerHTML = `<div class="hint">Nog geen data nie.</div>`;
    return;
  }

  const total = data.length;

  const bySpecies = {};
  let withCoords = 0;
  data.forEach(c=>{
    bySpecies[c.species] = (bySpecies[c.species] || 0) + 1;
    if(parseCoords(c.coords)) withCoords++;
  });

  const top = Object.entries(bySpecies).sort((a,b)=>b[1]-a[1]).slice(0,6);

  box.innerHTML = `
    <div class="entry">
      <div class="entryTitle">Total catches: ${total}</div>
      <div class="entryMeta">Met coords: ${withCoords}</div>
    </div>

    <div class="entry">
      <div class="entryTitle">Top species</div>
      ${top.map(([sp,n]) => `<div class="entryMeta">• ${escapeHtml(sp)}: ${n}</div>`).join("")}
    </div>
  `;
}

/* =========================
   MAP
========================= */
let map;
let markerLayer;

function renderMap(){
  const el = document.getElementById("map");
  if(!el) return;

  if(!map){
    map = L.map("map", { zoomControl:true });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    markerLayer = L.layerGroup().addTo(map);
    map.setView([-34.37, 21.42], 10); // default area (pas aan as jy wil)
  }

  markerLayer.clearLayers();

  const data = getAll();
  const points = [];

  data.forEach(c=>{
    const p = parseCoords(c.coords);
    if(!p) return;

    const title = `${c.species}${c.length ? " • "+c.length+"cm" : ""}`;
    const subtitle = `${c.date || ""}${c.place ? " • "+c.place : ""}<br>🌊 ${c.tide || ""} • 🌙 ${c.moon || ""}`;

    const m = L.marker([p.lat, p.lng]).bindPopup(
      `<b>${escapeHtml(title)}</b><br>${escapeHtml(subtitle)}`
    );
    markerLayer.addLayer(m);
    points.push([p.lat, p.lng]);
  });

  if(points.length){
    const bounds = L.latLngBounds(points);
    map.fitBounds(bounds, { padding:[30,30] });
  }
}

function focusOnCatch(id){
  const data = getAll();
  const c = data.find(x=>x.id === id);
  if(!c) return;

  const p = parseCoords(c.coords);
  if(!p){
    alert("Geen coords vir hierdie catch.");
    return;
  }

  showView("map");
  setTimeout(()=>{
    map.setView([p.lat, p.lng], 14);
    // Popup oopmaak: soek marker by coords
    markerLayer.eachLayer(layer=>{
      const ll = layer.getLatLng();
      if(Math.abs(ll.lat - p.lat) < 0.00001 && Math.abs(ll.lng - p.lng) < 0.00001){
        layer.openPopup();
      }
    });
  }, 220);
}

/* =========================
   EXPORT CSV
========================= */
function csvSafe(v){
  const s = String(v ?? "");
  if(s.includes(",") || s.includes('"') || s.includes("\n")){
    return `"${s.replaceAll('"','""')}"`;
  }
  return s;
}

function exportCSV(){
  const data = getAll();
  if(!data.length){
    alert("Geen data om te export nie.");
    return;
  }

  const headers = ["species","place","length_cm","date","coords","moon","tide","notes"];
  const rows = [headers.join(",")];

  data.forEach(c=>{
    rows.push([
      csvSafe(c.species),
      csvSafe(c.place),
      csvSafe(c.length),
      csvSafe(c.date),
      csvSafe(c.coords),
      csvSafe(c.moon),
      csvSafe(c.tide),
      csvSafe(c.notes)
    ].join(","));
  });

  const blob = new Blob([rows.join("\n")], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "fishlog.csv";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

/* =========================
   PWA SERVICE WORKER
========================= */
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}

/* =========================
   INIT
========================= */
setToday();
renderLog();
renderStats();

// exports (as jy ooit weer nodig het)
window.getGPS = getGPS;
window.saveCatch = saveCatch;
window.showView = showView;
</script>

</body>
  </html>
