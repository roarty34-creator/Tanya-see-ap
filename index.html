<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing PRO</title>

<style>
body{background:#07111f;color:white;font-family:Arial;margin:0;padding:10px;}
.card{background:#0f1c2e;padding:12px;border-radius:12px;margin-bottom:12px;}
button{width:100%;padding:10px;margin-top:8px;background:#47c7ff;border:none;border-radius:8px;font-weight:bold;}
input,select{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:none;}
.result{margin-top:10px;background:#081321;padding:10px;border-radius:10px;}
.bad{color:#ff6b6b;font-weight:bold;}
.good{color:#4cff88;font-weight:bold;}
.warn{color:#ffd166;font-weight:bold;}
</style>

</head>
<body>

<h2>🎣 Fishing PRO</h2>

<!-- WARNING -->
<div class="card">
<div class="result warn">
⚠️ Always verify with your official DFFE permit rules.
App values are reference only.
</div>
</div>

<!-- FISH DB -->
<div class="card">
<h3>🐟 Fish Info</h3>
<select id="species"></select>
<div id="info" class="result"></div>
</div>

<!-- CHECK -->
<div class="card">
<h3>📏 Size Check</h3>
<input id="size" type="number" placeholder="Enter size cm">
<button onclick="check()">Check</button>
<div id="result"></div>
</div>

<!-- LOG -->
<div class="card">
<h3>📝 Session Log</h3>
<input id="date" type="date">
<input id="spot" placeholder="Spot">
<input id="sp" placeholder="Species">
<button onclick="saveLog()">Save</button>
<div id="logs"></div>
</div>

<script>

// SAFE DB (NOT CLAIMING LEGAL)
const fish=[
{name:"Kob",min:60,bag:5,bait:"Chokka"},
{name:"Yellowtail",min:60,bag:10,bait:"Live bait"},
{name:"Hottentot",min:22,bag:10,bait:"Red bait"},
{name:"Shad",min:30,bag:4,bait:"Sardine"}
];

// LOAD
species.innerHTML=fish.map(f=>`<option>${f.name}</option>`).join("");

// SHOW INFO
species.onchange=function(){
let f=fish.find(x=>x.name==species.value);
info.innerHTML=`
<b>${f.name}</b><br>
Min size (app): ${f.min} cm<br>
Bag (app): ${f.bag}<br>
Bait: ${f.bait}<br><br>
<span class="warn">VERIFY OFFICIAL RULES</span>
`;
};
species.onchange();

// CHECK
function check(){
let f=fish.find(x=>x.name==species.value);

if(!size.value){
result.innerHTML="Enter size";
return;
}

if(size.value>=f.min){
result.innerHTML="<span class='good'>✔ Passes app size check</span><br><span class='warn'>Verify with permit</span>";
}else{
result.innerHTML="<span class='bad'>✖ Below app size</span><br><span class='warn'>Verify with permit</span>";
}
}

// LOGS
let logsData=JSON.parse(localStorage.getItem("logs")||"[]");

function saveLog(){
logsData.push({
date:date.value,
spot:spot.value,
species:sp.value
});

localStorage.setItem("logs",JSON.stringify(logsData));
renderLogs();
}

function renderLogs(){
logs.innerHTML=logsData.map(l=>`
<div>${l.date} - ${l.species}</div>
`).join("");
}
renderLogs();

</script>

</body>
</html>
