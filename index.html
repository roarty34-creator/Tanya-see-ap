<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Fishing App</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#061225">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
font-family:Arial;
background:#061225;
color:white;
margin:0;
padding:15px;
}

h1{
display:flex;
align-items:center;
gap:10px;
}

.topnav{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:10px;
}

.navbtn{
background:#0f1c38;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.navbtn.active{
background:#2fa4ff;
color:black;
}

.card{
background:#0f1c38;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:6px;
background:#081632;
color:white;
}

button{
background:#2fa4ff;
border:none;
padding:10px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

button.dark{
background:#0f1c38;
color:white;
}

#map{
height:420px;
border-radius:10px;
}

img.photo{
width:100%;
border-radius:10px;
margin-top:10px;
}

.mini{
font-size:12px;
color:#9fb0d0;
}

section{
display:none;
}
</style>
</head>

<body>

<h1>
<img src="icon-192.png" width="30">
Tanya Fishing App
</h1>

<div class="topnav">
<button class="navbtn" onclick="showTab('add')">Add</button>
<button class="navbtn" onclick="showTab('map')">Map</button>
<button class="navbtn" onclick="showTab('log')">Log</button>
<button class="navbtn" onclick="showTab('stats')">Stats</button>
<button class="navbtn" onclick="showTab('sea')">Sea</button>
</div>

<!-- ADD -->

<section id="add">

<div class="card">

<label>Species</label>
<select id="species">
<option value="">Choose</option>
<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Galjoen</option>
<option>Hottentot</option>
</select>

<label>Length</label>
<input id="length">

<label>Min Size</label>
<input id="minSize" readonly>

<label>Depth</label>
<input id="depth">

<label>Bait</label>
<input id="bait">

<label>Coordinates</label>
<input id="coords" readonly>

<button onclick="getGPS()">Get GPS</button>
<button onclick="getDepth()">Auto Depth</button>

<label>Photo</label>
<input type="file" id="photo">

<div id="photoPreview"></div>

<label>Notes</label>
<textarea id="notes"></textarea>

<button onclick="saveCatch()">Save Catch</button>

</div>

</section>

<!-- MAP -->

<section id="map">

<div class="card">
<button onclick="toggleSatellite()">Satellite</button>
</div>

<div id="map"></div>

</section>

<!-- LOG -->

<section id="log">

<div id="catchList"></div>

</section>

<!-- STATS -->

<section id="stats">

<div class="card">
<h3>Species Stats</h3>
<div id="statsBox"></div>
</div>

</section>

<!-- SEA -->

<section id="sea">

<div class="card">
<button onclick="loadSea()">Load Sea Conditions</button>
<div id="seaBox"></div>
</div>

</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const KEY="tanya_catches"

const MIN_SIZE={
"Cape Kob":60,
"Yellowtail":60,
"Red Roman":30,
"Snapper":30,
"Galjoen":35,
"Hottentot":22
}

function showTab(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

function getAll(){
return JSON.parse(localStorage.getItem(KEY)||"[]")
}

function saveAll(v){
localStorage.setItem(KEY,JSON.stringify(v))
}

document.getElementById("species").onchange=e=>{
const v=e.target.value
document.getElementById("minSize").value=MIN_SIZE[v]||""
}

document.getElementById("photo").onchange=e=>{
const f=e.target.files[0]
if(!f)return
const r=new FileReader()
r.onload=()=>{
document.getElementById("photoPreview").innerHTML=
`<img class="photo" src="${r.result}">`
}
r.readAsDataURL(f)
}

function saveCatch(){

const data=getAll()

data.push({
id:Date.now(),
species:species.value,
length:length.value,
depth:depth.value,
bait:bait.value,
coords:coords.value,
notes:notes.value,
photo:document.querySelector("#photoPreview img")?.src||"",
date:new Date().toLocaleDateString()
})

saveAll(data)

alert("Saved")

renderLog()
}

function renderLog(){

const box=document.getElementById("catchList")

box.innerHTML=""

getAll().reverse().forEach(c=>{

box.innerHTML+=`
<div class="card">

<b>${c.species}</b><br>

${c.length} cm<br>
Depth ${c.depth}m<br>
${c.coords}<br>

${c.photo?`<img class="photo" src="${c.photo}">`:""}

<button onclick="deleteCatch(${c.id})">Delete</button>

</div>
`
})
}

function deleteCatch(id){

const data=getAll().filter(c=>c.id!=id)

saveAll(data)

renderLog()
}

function getGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

coords.value=
pos.coords.latitude.toFixed(6)+","+pos.coords.longitude.toFixed(6)

})

}

async function getDepth(){

const c=coords.value

if(!c)return

const r=await fetch(
"https://api.opentopodata.org/v1/gebco2020?locations="+c
)

const j=await r.json()

const d=Math.abs(j.results[0].elevation)

depth.value=Math.round(d)

}

async function loadSea(){

const c=coords.value.split(",")

const lat=c[0]
const lon=c[1]

const r=await fetch(
`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&current=wave_height,swell_wave_height,sea_surface_temperature`
)

const j=await r.json()

seaBox.innerHTML=

`
Wave ${j.current.wave_height} m<br>
Swell ${j.current.swell_wave_height} m<br>
Sea temp ${j.current.sea_surface_temperature} °C
`

}

let map
let sat=false

function initMap(){

if(map)return

map=L.map("map").setView([-34.37,20.85],10)

osm=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map)

satLayer=L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
)

map.on("click",e=>{

coords.value=
e.latlng.lat.toFixed(6)+","+e.latlng.lng.toFixed(6)

})

}

function toggleSatellite(){

sat=!sat

if(sat){

map.removeLayer(osm)
satLayer.addTo(map)

}else{

map.removeLayer(satLayer)
osm.addTo(map)

}

}

showTab("add")

initMap()

renderLog()

</script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./sw.js")
}
</script>

</body>
  </html>
