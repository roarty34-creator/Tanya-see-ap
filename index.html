<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing PRO</title>

<style>
body{background:#07111f;color:white;font-family:Arial;margin:0;padding:10px;}
.card{background:#0f1c2e;padding:12px;border-radius:12px;margin-bottom:12px;}
button{padding:10px;width:100%;margin-top:8px;background:#47c7ff;border:none;border-radius:8px;font-weight:bold;}
input,select{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:none;}
.photo-preview img{width:100%;max-height:240px;object-fit:cover;border-radius:12px;}
</style>

</head>
<body>

<h2>🎣 Fishing PRO</h2>

<div class="card">
<h3>📷 Fish Helper</h3>

<input type="file" accept="image/*" onchange="previewFishPhoto(event)">

<div id="fishPhotoPreview" class="photo-preview">
No photo selected
</div>

<select id="fishMatchSelect"></select>

<button onclick="showFish()">Identify</button>

<div id="fishInfo"></div>

</div>

<script>

// SIMPLE DB
const fishDB=[
{name:"Kob",key:"kob",min:60,bag:5,bait:"Chokka"},
{name:"Yellowtail",key:"yellowtail",min:60,bag:10,bait:"Live bait"},
{name:"Hottentot",key:"hottentot",min:22,bag:10,bait:"Red bait"},
{name:"Shad",key:"shad",min:30,bag:4,bait:"Sardine"}
];

// LOAD DROPDOWN
function loadFish(){
fishMatchSelect.innerHTML=fishDB.map(f=>`
<option value="${f.key}">${f.name}</option>
`).join("");
}

// PREVIEW IMAGE
function previewFishPhoto(event){
const file=event.target.files[0];
if(!file)return;

const reader=new FileReader();
reader.onload=function(e){
fishPhotoPreview.innerHTML=`<img src="${e.target.result}">`;
};
reader.readAsDataURL(file);
}

// SHOW INFO
function showFish(){
const key=fishMatchSelect.value;
const f=fishDB.find(x=>x.key===key);

fishInfo.innerHTML=`
<b>${f.name}</b><br>
Min: ${f.min}cm<br>
Bag: ${f.bag}<br>
Bait: ${f.bait}
`;
}

// INIT
loadFish();

</script>

</body>
</html>
