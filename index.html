<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tanya Deep Sea V44</title>

<link rel="manifest" href="manifest.webmanifest">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#061225;
color:white;
margin:0;
padding:16px;
}

h1{
font-size:22px;
margin-bottom:10px;
}

.topnav{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:12px;
}

.navbtn{
background:#0f1c38;
border:none;
padding:9px 12px;
border-radius:8px;
color:white;
font-weight:bold;
}

.card{
background:#0f1c38;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,select,textarea{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#081632;
color:white;
}

button{
margin-top:10px;
background:#2fa4ff;
border:none;
padding:10px;
border-radius:8px;
color:#001420;
font-weight:bold;
}

button.dark{
background:#132447;
color:white;
}

button.danger{
background:#ff5c5c;
color:white;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.row>*{
flex:1;
}

#map{
height:420px;
border-radius:12px;
}

section{
display:none;
}

img.photo{
width:100%;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>🚤 Tanya Deep Sea</h1>

<div class="topnav">

<button class="navbtn" onclick="showTab('add')">Add Catch</button>

<button class="navbtn" onclick="showTab('mapTab')">Map</button>

<button class="navbtn" onclick="showTab('spots')">Spots</button>

<button class="navbtn" onclick="showTab('log')">Log</button>

<button class="navbtn" onclick="showTab('stats')">Stats</button>

<button class="navbtn" onclick="showTab('fishid')">Fish Helper</button>

</div>


<section id="add">

<div class="card">

<label>Species</label>

<select id="species">

<option value="">Choose</option>

<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Silverfish</option>

</select>

<label>Length (cm)</label>

<input id="length">

<label>Minimum Size</label>

<input id="minSize" readonly>

<div id="sizeNote"></div>

<label>Bait Used</label>

<input id="bait">

<label>Automatic Nearest Spot</label>

<input id="autoSpot" readonly>

<label>Manual Spot Choice</label>

<select id="manualSpotPick">
<option value="">Choose spot manually</option>
</select>

<label>Coordinates</label>

<div class="row">

<input id="coords" readonly>

<button onclick="getGPS()">Get GPS</button>

<button class="dark" onclick="showTab('mapTab')">Open Map</button>

</div>

<label>Photo</label>

<input id="photo" type="file" accept="image/*">

<div id="photoPreview"></div>

<label>Notes</label>

<textarea id="notes"></textarea>

<div class="row">

<button onclick="saveCatch()">SAVE CATCH</button>

<button class="dark" onclick="clearCatchForm()">Clear</button>

</div>

</div>

</section>



<section id="mapTab">

<div class="card">

<button onclick="toggleSatellite()">Satellite</button>

</div>

<div id="map"></div>

</section>



<section id="spots">

<div class="card">

<button onclick="saveSpotFromCoords()">Save Spot</button>

</div>

<div id="spotsList"></div>

</section>



<section id="log">

<div id="catchList"></div>

</section>



<section id="stats">

<div class="card">

<b>Catch Stats</b>

<div id="statsBox"></div>

</div>

</section>



<section id="fishid">

<div class="card">

<label>Fish Photo</label>

<input type="file" id="fishIdPhoto" accept="image/*">

<div id="fishIdPreview"></div>

<label>Species</label>

<select id="fishIdSpecies">

<option value="">Choose</option>

<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>

</select>

<button onclick="saveFishHelper()">Save Helper</button>

<div id="fishHelpers"></div>

</div>

</section>



<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const KEY_CATCHES="tanya_catches";
const KEY_SPOTS="tanya_spots";

let map;
let satOn=false;

const BASE={lat:-34.37,lng:20.85};

const MIN_SIZE={
"Cape Kob":60,
"Yellowtail":60,
"Bonito":0,
"Red Roman":30,
"Snapper":30,
"Silverfish":25
};

const species=document.getElementById("species");
const lengthEl=document.getElementById("length");
const minSizeEl=document.getElementById("minSize");

species.onchange=()=>{
minSizeEl.value=MIN_SIZE[species.value]||"";
};

function getAllCatches(){
return JSON.parse(localStorage.getItem(KEY_CATCHES)||"[]");
}

function saveAllCatches(v){
localStorage.setItem(KEY_CATCHES,JSON.stringify(v));
}

function getAllSpots(){
return JSON.parse(localStorage.getItem(KEY_SPOTS)||"[]");
}

function saveAllSpots(v){
localStorage.setItem(KEY_SPOTS,JSON.stringify(v));
}

function showTab(id){

document.querySelectorAll("section")
.forEach(s=>s.style.display="none");

document.getElementById(id).style.display="block";

if(id==="mapTab") initMap();

if(id==="log") renderLog();

if(id==="stats") renderStats();

if(id==="spots") renderSpots();

}

function initMap(){

if(map) return;

map=L.map("map").setView([BASE.lat,BASE.lng],10);

const osm=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map);

}

function toggleSatellite(){
alert("Satellite layer optional");
}

function parseCoords(str){

if(!str) return null;

const p=str.split(",");

return {lat:Number(p[0]),lng:Number(p[1])};

}

function getGPS(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

coords.value=lat+","+lng;

L.marker([lat,lng]).addTo(map);

map.setView([lat,lng],13);

});

}

function saveCatch(){

const sp=species.value;

if(!sp){
alert("Choose species");
return;
}

const list=getAllCatches();

list.push({

id:Date.now(),
species:sp,
length:lengthEl.value,
coords:coords.value,
notes:notes.value

});

saveAllCatches(list);

alert("Saved");

clearCatchForm();

renderLog();

renderStats();

}

function clearCatchForm(){

species.value="";
lengthEl.value="";
coords.value="";
notes.value="";

}

function renderLog(){

const box=document.getElementById("catchList");

const list=getAllCatches();

box.innerHTML="";

list.reverse().forEach(c=>{

box.innerHTML+=`

<div class="card">

<b>${c.species}</b><br>

${c.length} cm<br>

${c.coords}

</div>

`;

});

}

function renderStats(){

const box=document.getElementById("statsBox");

const list=getAllCatches();

if(!list.length){

box.innerHTML="No catches";

return;

}

const bySpecies={};

list.forEach(c=>{

if(!bySpecies[c.species]) bySpecies[c.species]=0;

bySpecies[c.species]++;

});

let html="";

Object.keys(bySpecies).forEach(sp=>{

html+=`${sp} : ${bySpecies[sp]} catches<br>`;

});

box.innerHTML=html;

}

function renderSpots(){

const box=document.getElementById("spotsList");

const spots=getAllSpots();

box.innerHTML="";

spots.forEach(s=>{

box.innerHTML+=`

<div class="card">

<b>${s.name}</b>

${s.coords}

</div>

`;

});

}

showTab("add");

</script>


</body>
</html>
