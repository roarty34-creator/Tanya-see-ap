<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Fishing ULTIMATE</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#061225">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#061225;color:white;}
header{padding:15px;text-align:center;background:#081632;font-size:20px;font-weight:bold;}
.card{background:#0f1c38;padding:12px;margin:10px;border-radius:10px;}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none;}
button{padding:10px;background:#2fa4ff;border:none;border-radius:8px;color:white;}
.ok{color:#39d98a;} .danger{color:red;} .warn{color:orange;}
#map{height:250px;border-radius:10px;}
</style>
</head>

<body>

<header>🎣 Fishing ULTIMATE APP</header>

<div class="card">
<h3>🌊 Live Sea + Wind</h3>
<div id="sea">Loading...</div>
</div>

<div class="card">
<h3>🌊 Real Tide (API Ready)</h3>
<div id="tide">Loading...</div>
</div>

<div class="card">
<h3>📍 Map (Save + Delete)</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>⚖️ Legal Check</h3>
<select id="fish"></select>
<input id="size" placeholder="Size cm">
<input id="count" placeholder="Count">
<button onclick="check()">Check</button>
<div id="res"></div>
</div>

<div class="card">
<h3>🧠 Bait Predictor</h3>
<select id="baitFish"></select>
<button onclick="predict()">Predict</button>
<div id="bait"></div>
</div>

<div class="card">
<h3>📊 Catch Log + Stats</h3>
<select id="cFish"></select>
<input id="cSize" placeholder="Size">
<button onclick="save()">Save</button>
<div id="log"></div>
<div id="stats"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🌊 SEA
fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.37&longitude=21.42&current=wind_speed_10m")
.then(r=>r.json())
.then(d=>{
sea.innerHTML="Wind: "+d.current.wind_speed_10m+" km/h";
});

// 🌊 REAL TIDE (DEMO READY FOR API)
let h=new Date().getHours();
tide.innerHTML=h%12<6?"Rising tide":"Falling tide";

// 🐟 DATA
const fishData=[
{name:"Kabeljou",size:60,bag:5},
{name:"Yellowtail",size:60,bag:10},
{name:"Galjoen",size:35,bag:2},
{name:"Leervis",size:70,bag:2}
];

// fill
fishData.forEach(f=>{
fish.innerHTML+=`<option>${f.name}</option>`;
baitFish.innerHTML+=`<option>${f.name}</option>`;
cFish.innerHTML+=`<option>${f.name}</option>`;
});

// ⚖️ CHECK
function check(){
let f=fishData.find(x=>x.name==fish.value);
res.innerHTML=
(size.value>=f.size?"<div class='ok'>Size OK</div>":"<div class='danger'>Too small</div>")+
(count.value>f.bag?"<div class='danger'>Over bag</div>":"<div class='ok'>Bag OK</div>");
}

// 🧠 BAIT
function predict(){
let f=baitFish.value;
let bait="Chokka + Sardine";
if(f=="Yellowtail") bait="Live bait / spoon";
if(f=="Galjoen") bait="Red bait";
if(f=="Leervis") bait="Live mullet";
document.getElementById("bait").innerHTML=bait;
}

// 📊 CATCH
function save(){
let data=JSON.parse(localStorage.getItem("catch")||"[]");
data.push({fish:cFish.value,size:cSize.value});
localStorage.setItem("catch",JSON.stringify(data));
load();
}

function load(){
let data=JSON.parse(localStorage.getItem("catch")||"[]");
log.innerHTML=data.map(d=>d.fish+" "+d.size+"cm").join("<br>");

let count={};
data.forEach(d=>count[d.fish]=(count[d.fish]||0)+1);
let top=Object.keys(count).sort((a,b)=>count[b]-count[a])[0];
stats.innerHTML="Top fish: "+(top||"-");
}
load();

// 📍 MAP
let map=L.map('map').setView([-34.37,21.42], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let spots=JSON.parse(localStorage.getItem("spots")||"[]");

function renderSpots(){
spots.forEach((s,i)=>{
let m=L.marker([s.lat,s.lng]).addTo(map).bindPopup(s.name);
m.on('click',()=>{
if(confirm("Delete this spot?")){
spots.splice(i,1);
localStorage.setItem("spots",JSON.stringify(spots));
location.reload();
}
});
});
}
renderSpots();

map.on('click', function(e){
let name=prompt("Spot name?");
if(!name) return;
let obj={lat:e.latlng.lat,lng:e.latlng.lng,name:name};
spots.push(obj);
localStorage.setItem("spots",JSON.stringify(spots));
location.reload();
});

// 🔌 SERVICE WORKER
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
