<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tanya Deep Sea</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#061225">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root{
      --bg:#061225;
      --card:#0f1c38;
      --card2:#081632;
      --accent:#2fa4ff;
      --text:#ffffff;
      --muted:#9fb0d0;
      --danger:#ff5c5c;
      --ok:#39d98a;
      --reef:#ffd166;
      --spot:#59d0ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(#061225,#081b3d);
      color:var(--text);
      padding:16px;
    }
    h1{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:22px;
      margin:0 0 12px;
    }
    .topnav{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .navbtn{
      background:#0f1c38;
      border:none;
      padding:9px 12px;
      border-radius:8px;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }
    .navbtn.active{
      background:var(--accent);
      color:#001420;
    }
    .card{
      background:var(--card);
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
      }
    label{
      display:block;
      font-size:12px;
      margin-top:10px;
      color:#8aa0c9;
    }
    input,select,textarea{
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#081632;
      color:white;
      box-sizing:border-box;
    }
    textarea{
      min-height:70px;
      resize:vertical;
    }
    button{
      margin-top:10px;
      background:#2fa4ff;
      border:none;
      padding:10px;
      border-radius:8px;
      color:#001420;
      font-weight:bold;
      cursor:pointer;
    }
    button.dark{
      background:#132447;
      color:white;
    }
    button.danger{
      background:#ff5c5c;
      color:white;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .row>*{
      flex:1;
    }
    .mini{
      font-size:12px;
      color:#9fb0d0;
    }
    .chip{
      display:inline-block;
      background:#081632;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      margin:4px 4px 0 0;
    }
    #map{
      height:420px;
      border-radius:12px;
      overflow:hidden;
    }
    section{
      display:none;
    }
  </style>
</head>

<body>

<h1>🚤 Tanya Deep Sea</h1>

<div class="topnav">
<button class="navbtn" onclick="showTab('add')">Add Catch</button>
<button class="navbtn" onclick="showTab('mapTab')">Map</button>
<button class="navbtn" onclick="showTab('spots')">Spots</button>
<button class="navbtn" onclick="showTab('log')">Log</button>
<button class="navbtn" onclick="showTab('stats')">Stats</button>
<button class="navbtn" onclick="showTab('sea')">Best Days</button>
<button class="navbtn" onclick="showTab('fishid')">Fish ID</button>
</div>

<section id="add">

<div class="card">

<label>Species</label>
<select id="species">
<option value="">Choose...</option>
<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Silverfish</option>
<option>Red Steenbras</option>
<option>Yellow Belly</option>
<option>Galjoen</option>
<option>Hottentot</option>
</select>

<label>Length (cm)</label>
<input id="length">

<label>Minimum Size</label>
<input id="minSize" readonly>

<label>Depth (m)</label>
<div class="row">
<input id="depth">
<button onclick="getDepthFromCurrentCoords()">Auto Depth</button>
</div>

<label>Bait Used</label>
<input id="bait">

<label>Choose Spot</label>
<select id="spotPick">
<option value="">Choose spot</option>
</select>

<label>Coordinates</label>
<div class="row">
<input id="coords" readonly>
<button onclick="getGPS()">Get GPS</button>
<button class="dark" onclick="showTab('mapTab')">Open Map</button>
</div>

<label>Where Caught</label>
<input id="place" value="Deep Sea" readonly>

<label>Local Area</label>
<input id="localArea">

<div class="row">
<div class="chip" id="chipWind">Wind: --</div>
<div class="chip" id="chipSwell">Swell: --</div>
<div class="chip" id="chipTemp">Sea Temp: --</div>
<div class="chip" id="chipCurrent">Current: --</div>
</div>

<label>Photo</label>
<input id="photo" type="file" accept="image/*">

<div id="photoPreview"></div>

<label>Notes</label>
<textarea id="notes"></textarea>

<div class="row">
<button onclick="saveCatch()">SAVE CATCH</button>
<button class="dark" onclick="clearCatchForm()">Clear</button>
</div>

</div>
</section>

<section id="mapTab">

<div class="card">

<div class="row">
<button onclick="toggleSatellite()">🛰 Satellite ON/OFF</button>
<button class="dark" onclick="toggleReefOverlay()">Show Reef Areas</button>
</div>

</div>

<div id="map"></div>

</section>

<section id="spots">

<div class="card">
<b>Saved Spots</b>
<button onclick="saveSpotFromCoords()">Save Current Spot</button>
</div>

<div id="spotsList"></div>

</section>

<section id="log">

<div class="card">
<b>Catch Log</b>
<button class="danger" onclick="resetAll()">Delete All</button>
</div>

<div id="catchList"></div>

</section>

<section id="stats">

<div class="card">
<b>Best Depth per Species</b>
<canvas id="depthChart" width="900" height="220"></canvas>
</div>

<div class="card">
<b>Stats Summary</b>
<div id="statsBox"></div>
</div>

</section>

<section id="sea">

<div class="card">
<b>2 Week Best Fishing Days</b>

<table>

<tr>
<th>Date</th>
<th>Wave</th>
<th>Wind</th>
<th>Score</th>
<th>Fishing</th>
</tr>

<tbody id="fishDays"></tbody>

</table>

</div>

</section>

<section id="fishid">

<div class="card">

<b>Fish Photo Helper</b>

<label>Fish Photo</label>
<input type="file" id="fishIdPhoto" accept="image/*">

<div id="fishIdPreview"></div>

<label>Species</label>
<select id="fishIdSpecies">
<option value="">Choose...</option>
<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Silverfish</option>
<option>Red Steenbras</option>
<option>Yellow Belly</option>
<option>Galjoen</option>
<option>Hottentot</option>
</select>

<button onclick="saveFishHelper()">Save Helper</button>

<div id="fishHelpers"></div>

</div>

</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

function showTab(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

showTab("add")

</script>

</body>
</html>
