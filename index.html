
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Fishing App PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061225;
  color:white;
}
header{
  background:#0a1835;
  padding:15px;
  text-align:center;
  font-size:20px;
}
.card{
  background:#0f1c38;
  margin:10px;
  padding:15px;
  border-radius:12px;
}
button{
  background:#2fa4ff;
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
}
input,select{
  padding:8px;
  border-radius:6px;
  border:none;
  width:100%;
  margin-top:5px;
}
.tab{
  display:flex;
  justify-content:space-around;
  background:#081632;
  padding:10px;
}
.tab button{
  flex:1;
  margin:2px;
}
.hidden{display:none;}
</style>

</head>
<body>

<header>🎣 Tanya Fishing PRO</header>

<div class="tab">
<button onclick="showTab('sw')">🌊 SW</button>
<button onclick="showTab('mani')">📒 MANI</button>
<button onclick="showTab('ai')">🧠 AI</button>
</div>

<!-- SW TAB -->
<div id="sw" class="card">

<h3>🌊 Tide + Sea (Stilbaai)</h3>
<p id="tide">Loading...</p>

<h3>🌡 Sea Temp</h3>
<p id="temp">Loading...</p>

<h3>🌊 Wave Height</h3>
<p id="wave">Loading...</p>

</div>

<!-- MANI TAB -->
<div id="mani" class="card hidden">

<h3>📒 Catch Log</h3>

<select id="fish">
<option>Kob</option>
<option>Yellowtail</option>
<option>Hottentot</option>
<option>Geelbek</option>
</select>

<input id="size" placeholder="Size cm">
<input id="bait" placeholder="Bait used">

<button onclick="saveCatch()">Save</button>

<h4>Logs:</h4>
<ul id="log"></ul>

</div>

<!-- AI TAB -->
<div id="ai" class="card hidden">

<h3>🧠 AI Bait Predictor</h3>
<button onclick="predict()">Predict Best Bait</button>
<p id="result"></p>

<h3>📊 Best Bait Used</h3>
<p id="bestBait"></p>

</div>

<script>

// TAB SWITCH
function showTab(tab){
  document.getElementById("sw").classList.add("hidden");
  document.getElementById("mani").classList.add("hidden");
  document.getElementById("ai").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");
}

// OPEN METEO (STILBAAI)
fetch("https://api.open-meteo.com/v1/marine?latitude=-34.37&longitude=21.42&hourly=wave_height,sea_surface_temperature,sea_level_height_msl")
.then(res=>res.json())
.then(data=>{
  document.getElementById("wave").innerText = data.hourly.wave_height[0] + " m";
  document.getElementById("temp").innerText = data.hourly.sea_surface_temperature[0] + " °C";

  let tide = data.hourly.sea_level_height_msl[0];
  document.getElementById("tide").innerText = tide > 0 ? "High Trend ↑" : "Low Trend ↓";
});

// SAVE CATCH
function saveCatch(){
  let fish = document.getElementById("fish").value;
  let size = document.getElementById("size").value;
  let bait = document.getElementById("bait").value;

  let log = JSON.parse(localStorage.getItem("logs") || "[]");

  log.push({fish,size,bait});
  localStorage.setItem("logs",JSON.stringify(log));

  renderLog();
}

// SHOW LOG
function renderLog(){
  let log = JSON.parse(localStorage.getItem("logs") || "[]");
  let list = document.getElementById("log");
  list.innerHTML = "";

  log.forEach(l=>{
    let li = document.createElement("li");
    li.innerText = l.fish + " - " + l.size + "cm - " + l.bait;
    list.appendChild(li);
  });
}
renderLog();

// AI PREDICT
function predict(){
  let log = JSON.parse(localStorage.getItem("logs") || "[]");

  let baitCount = {};

  log.forEach(l=>{
    baitCount[l.bait] = (baitCount[l.bait]||0)+1;
  });

  let best = Object.keys(baitCount).sort((a,b)=>baitCount[b]-baitCount[a])[0];

  document.getElementById("result").innerText = "Best bait: " + (best || "No data");
  document.getElementById("bestBait").innerText = best || "No data";
}

</script>

</body>
</html>
