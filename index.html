<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Deep Sea Fishing App</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#061225">

<style>
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#061225;
  color:white;
  margin:0;
  padding:16px;
}
h1{margin:0 0 4px}
.nav{display:flex;gap:6px;margin:12px 0}
button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2fa4ff;
  color:#001420;
  font-weight:bold;
}
.card{
  background:#0f1c38;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}
input,select,textarea{
  width:100%;
  padding:8px;
  margin-top:6px;
  margin-bottom:8px;
  border-radius:8px;
  border:none;
  background:#081632;
  color:white;
}
.spot{background:#081632;padding:10px;border-radius:10px;margin-top:8px}
.mini{font-size:12px;color:#9fb0d0}
img{max-width:220px;border-radius:10px;margin-top:6px}
</style>
</head>

<body>

<h1>Tanya Deep Sea Fishing</h1>
<div class="mini">V105 Stable</div>

<div class="nav">
<button onclick="show('spots')">Spots</button>
<button onclick="show('catch')">Add Catch</button>
<button onclick="show('weather')">Weather</button>
<button onclick="show('fish')">Fish Info</button>
</div>

<!-- SPOTS -->
<section id="spots">
<div class="card">
<b>Garmin Spots</b>

<div id="spotList"></div>

</div>
</section>


<!-- ADD CATCH -->
<section id="catch" style="display:none">
<div class="card">

<label>Species</label>
<select id="species"></select>

<label>Bait Used</label>
<select id="bait"></select>

<label>Size (cm)</label>
<input id="size">

<label>Area</label>
<input id="area">

<label>Coordinates</label>
<input id="coords">

<label>Notes</label>
<textarea id="notes"></textarea>

<label>Fish Photo</label>
<input type="file" id="photo">

<button onclick="saveCatch()">Save Catch</button>

</div>

<div class="card">
<b>Log</b>
<div id="log"></div>
</div>

</section>


<!-- WEATHER -->
<section id="weather" style="display:none">
<div class="card">
<b>7 Day Weather</b>
<div id="forecast"></div>
</div>
</section>


<!-- FISH INFO -->
<section id="fish" style="display:none">
<div class="card">

<select id="fishSelect"></select>

<div id="fishInfo"></div>

</div>
</section>


<script>

const HARBOUR={lat:-34.385542,lon:21.425433}

const SPOTS=[
{name:"Skulpbank",coord:"-34.3905,20.8602"},
{name:"Blinde Rif",coord:"-34.4015,20.8801"},
{name:"Kabeljou Ridge",coord:"-34.3750,20.8700"},
{name:"East Reef",coord:"-34.3925,21.4360"}
]


const BAIT_BY_SPECIES={
"Cape Kob":["Chokka","Chokka + Pilchard combo","Live Makriel","Pilchard belly","Sardine"],
"Yellowtail":["Live Makriel","Sardine","Metal spoon","Yo-Zuri minnow"],
"Bonito":["Feather lure","Sardine strip","Yo-Zuri minnow"],
"Red Roman":["Chokka","Pilchard","Octopus"],
"Snapper":["Chokka","Pilchard","Redbait"],
"Silverfish":["Chokka strip","Pilchard strip","Mussel"],
"Red Steenbras":["Big chokka bait","Pilchard"],
"Yellow Belly":["Chokka","Pilchard"],
"Hottentot":["Mussel","Redbait","Chokka strip"]
}


const FISH_INFO={

"Cape Kob":{
note:"Best from spring to autumn. Warmer water and pushing tide.",
bait:"Chokka + Pilchard combo, Live Makriel"
},

"Yellowtail":{
note:"Best summer to autumn when bait balls appear.",
bait:"Live Makriel, Sardine"
},

"Bonito":{
note:"Best summer when birds chase bait.",
bait:"Feather lure, Sardine strip"
},

"Red Roman":{
note:"Good all year on reef.",
bait:"Chokka, Pilchard"
},

"Snapper":{
note:"Good all year on reef structure.",
bait:"Chokka, Redbait"
},

"Silverfish":{
note:"Good all year over reef.",
bait:"Chokka strip"
},

"Red Steenbras":{
note:"Closed season 1 Sep – 30 Nov.",
bait:"Big chokka bait"
},

"Yellow Belly":{
note:"Reef patches and current lines.",
bait:"Chokka"
},

"Hottentot":{
note:"Small bait works best.",
bait:"Mussel"
}

}


function show(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}


function renderSpots(){
let html=""
SPOTS.forEach(s=>{
html+=`<div class="spot">
<b>${s.name}</b><br>
${s.coord}
</div>`
})
document.getElementById("spotList").innerHTML=html
}


function fillSpecies(){
let s=document.getElementById("species")
let f=document.getElementById("fishSelect")

Object.keys(FISH_INFO).forEach(sp=>{
s.innerHTML+=`<option>${sp}</option>`
f.innerHTML+=`<option>${sp}</option>`
})
}


document.getElementById("species").addEventListener("change",()=>{
let sp=document.getElementById("species").value
let bait=document.getElementById("bait")
bait.innerHTML=""
BAIT_BY_SPECIES[sp].forEach(b=>{
bait.innerHTML+=`<option>${b}</option>`
})
})


document.getElementById("fishSelect").addEventListener("change",()=>{
let sp=document.getElementById("fishSelect").value
let info=FISH_INFO[sp]

document.getElementById("fishInfo").innerHTML=
`<div class="spot">
<b>${sp}</b><br>
${info.note}<br><br>
Best bait:<br>
${info.bait}
</div>`
})


function saveCatch(){

let data={
species:species.value,
bait:bait.value,
size:size.value,
area:area.value,
coords:coords.value,
notes:notes.value,
date:new Date().toLocaleString()
}

let log=JSON.parse(localStorage.getItem("log")||"[]")
log.unshift(data)
localStorage.setItem("log",JSON.stringify(log))

renderLog()
}


function renderLog(){

let log=JSON.parse(localStorage.getItem("log")||"[]")
let html=""

log.forEach(l=>{
html+=`<div class="spot">
<b>${l.species}</b><br>
${l.bait}<br>
${l.size} cm<br>
${l.area}<br>
${l.coords}<br>
${l.date}
</div>`
})

document.getElementById("log").innerHTML=html
}


async function weather(){

let url=`https://api.open-meteo.com/v1/forecast?latitude=${HARBOUR.lat}&longitude=${HARBOUR.lon}&daily=wind_speed_10m_max&forecast_days=7&timezone=Africa%2FJohannesburg`
let r=await fetch(url)
let j=await r.json()

let html=""

j.daily.time.forEach((d,i)=>{
let w=j.daily.wind_speed_10m_max[i]
html+=`${d} — wind ${w} km/h<br>`
})

document.getElementById("forecast").innerHTML=html
}


renderSpots()
fillSpecies()
renderLog()
weather()

</script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}
</script>

</body>
</html>
