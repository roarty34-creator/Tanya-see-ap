<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tanya Deep Sea V51 Stable</title>

<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#061225">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
--bg:#061225;
--card:#0f1c38;
--card2:#081632;
--accent:#2fa4ff;
--text:#ffffff;
--muted:#9fb0d0;
--danger:#ff5c5c;
--ok:#39d98a;
--reef:#ffd166;
--spot:#59d0ff;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(#061225,#081b3d);
color:#fff;
padding:16px;
}

h1{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
margin:0 0 12px;
}

.topnav{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:12px;
}

.navbtn{
background:#0f1c38;
border:none;
padding:9px 12px;
border-radius:8px;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.navbtn.active{
background:var(--accent);
color:#001420;
}

.card{
background:var(--card);
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

label{
display:block;
font-size:12px;
margin-top:10px;
color:var(--muted);
}

input,select,textarea{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:var(--card2);
color:#fff;
}

button{
margin-top:10px;
background:var(--accent);
border:none;
padding:10px;
border-radius:8px;
color:#001420;
font-weight:bold;
cursor:pointer;
}

button.dark{
background:#132447;
color:#fff;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

section{display:none}

#map{
height:430px;
border-radius:12px;
overflow:hidden;
}

.photo{
width:100%;
border-radius:12px;
margin-top:10px;
}

.mini{
font-size:12px;
color:var(--muted);
}

.chip{
display:inline-block;
background:#081632;
padding:6px 10px;
border-radius:999px;
font-size:12px;
margin:4px 4px 0 0;
}

</style>
</head>

<body>

<h1>
<img src="./icon-192.png" width="30">
Tanya Deep Sea V51 Stable
</h1>

<div class="topnav">

<button class="navbtn" onclick="showTab('add')">Add Catch</button>
<button class="navbtn" onclick="showTab('mapTab')">Map</button>
<button class="navbtn" onclick="showTab('spots')">Saved Spots</button>
<button class="navbtn" onclick="showTab('log')">Log</button>
<button class="navbtn" onclick="showTab('stats')">Stats</button>
<button class="navbtn" onclick="showTab('fishid')">Fish Helper</button>
<button class="navbtn" onclick="showTab('weather')">Tide & Moon</button>

</div>

<!-- ADD CATCH -->

<section id="add">

<div class="card">

<b>Add Catch</b>

<label>Species</label>
<select id="species">
<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Silverfish</option>
<option>Red Steenbras</option>
<option>Yellow Belly</option>
<option>Galjoen</option>
<option>Hottentot</option>
</select>

<label>Length (cm)</label>
<input id="length">

<label>Minimum Size</label>
<input id="minSize" readonly>

<label>Bait Used</label>
<input id="bait">

<label>Coordinates</label>
<div class="row">
<input id="coords">
<button onclick="getGPS()">Get GPS</button>
<button class="dark" onclick="showTab('mapTab')">Open Map</button>
</div>

<div class="row">
<div class="chip" id="chipWind">Wind: —</div>
<div class="chip" id="chipSwell">Swell: —</div>
<div class="chip" id="chipTemp">Temp: —</div>
<div class="chip" id="chipCurrent">Current: —</div>
</div>

<label>Photo</label>
<input id="photo" type="file" accept="image/*" capture="environment">
<div id="photoPreview"></div>

<label>Notes</label>
<textarea id="notes"></textarea>

<button onclick="saveCatch()">SAVE CATCH</button>

</div>
</section>

<!-- MAP -->

<section id="mapTab">
<div id="map"></div>
</section>

<!-- WEATHER -->

<section id="weather">
<div class="card">
<b>Moon & Bite Prediction</b>
<div id="weatherBox"></div>
</div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const BASE = {lat:-34.37,lng:20.85}

let map
let osm
let sat

function showTab(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

if(id==="mapTab"){
setTimeout(()=>{map.invalidateSize()},200)
}

if(id==="weather"){
renderWeatherPanel()
}

}

function initMap(){

map=L.map("map").setView([BASE.lat,BASE.lng],10)

osm=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map)

}

function getMoonPhase(){

const lp=2551443
const new_moon=new Date("2001-01-24T13:08:00Z").getTime()

const phase=((Date.now()-new_moon)/1000)%lp

return phase/lp

}

function moonName(){

const p=getMoonPhase()

if(p<0.03||p>0.97)return"New Moon"
if(p<0.25)return"Waxing Crescent"
if(p<0.28)return"First Quarter"
if(p<0.50)return"Waxing Gibbous"
if(p<0.53)return"Full Moon"
if(p<0.75)return"Waning Gibbous"
if(p<0.78)return"Last Quarter"

return"Waning Crescent"

}

function bitePrediction(){

const phase=getMoonPhase()

let score=50

if(phase<0.05||phase>0.95)score+=20
if(Math.abs(phase-0.5)<0.05)score+=20

const wind=parseFloat(chipWind.textContent.match(/\d+/))

if(wind<15)score+=10
if(wind>25)score-=10

score=Math.max(0,Math.min(100,score))

let label="Fair"

if(score>80)label="Excellent"
else if(score>65)label="Good"
else if(score<40)label="Slow"

return{score,label}

}

function renderWeatherPanel(){

const moon=moonName()
const bite=bitePrediction()

weatherBox.innerHTML=`

<div class="card">
<b>Moon Phase</b>
<div class="mini">${moon}</div>
</div>

<div class="card">
<b>Bite Prediction</b>
<div class="mini">Score ${bite.score}/100</div>
<div class="mini">${bite.label}</div>
</div>

`

}

async function estimateCurrentStrength(lat,lon){

try{

const weatherUrl=
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=wind_speed_10m`

const marineUrl=
`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&current=wave_height,sea_surface_temperature`

const wr=await fetch(weatherUrl)
const mr=await fetch(marineUrl)

const w=await wr.json()
const m=await mr.json()

chipWind.textContent=`Wind: ${w.current.wind_speed_10m} km/h`
chipSwell.textContent=`Swell: ${m.current.wave_height} m`
chipTemp.textContent=`Temp: ${m.current.sea_surface_temperature}°C`

chipCurrent.textContent="Current: ~0.6 kt"

}catch{

chipWind.textContent="Wind: —"

}

}

async function getGPS(){

navigator.geolocation.getCurrentPosition(async pos=>{

const lat=pos.coords.latitude
const lon=pos.coords.longitude

coords.value=lat.toFixed(6)+","+lon.toFixed(6)

await estimateCurrentStrength(lat,lon)

renderWeatherPanel()

})

}

initMap()
showTab("add")

</script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./sw.js")
}
</script>

</body>
</html>
