<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Deep Sea Fishing App</title>

<style>

body{
margin:0;
font-family:Arial;
background:#061225;
color:white;
padding:16px;
}

h1{
margin:0;
font-size:28px;
}

.mini{
font-size:12px;
opacity:0.7;
}

.heroBadge{
display:inline-block;
margin-top:10px;
padding:8px 14px;
border-radius:999px;
background:#14305d;
font-size:12px;
font-weight:bold;
}

.card{
background:#0c1d3c;
padding:16px;
border-radius:14px;
margin-top:14px;
}

.navbtn{
padding:10px;
border-radius:10px;
background:#1a3566;
border:none;
color:white;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border-bottom:1px solid #1e3766;
padding:10px;
text-align:left;
}

.identifyBox{
background:#132b57;
padding:16px;
border-radius:12px;
margin-top:12px;
}

.identifyTitle{
font-weight:bold;
margin-bottom:10px;
font-size:18px;
}

</style>
</head>

<body>

<h1>🎣 Tanya Deep Sea Fishing App</h1>
<div class="mini">V108 Clean • Stilbaai Offshore Edition</div>
<div class="heroBadge">Spots • Catches • Weather • Fish Info • Fish ID</div>


<div class="card">

<button class="navbtn" onclick="showTab('weatherTab')">🌊 Weather</button>

</div>


<section id="weatherTab">

<div class="card">

<div class="identifyBox">

<div class="identifyBox">
  <div class="identifyTitle">Tide Times</div>

  <table>
    <tr>
      <th>Tide</th>
      <th>Time</th>
      <th>Height</th>
    </tr>

    <tr>
      <td>High Tide</td>
      <td id="highTideTime">--</td>
      <td id="highTideHeight">--</td>
    </tr>

    <tr>
      <td>Low Tide</td>
      <td id="lowTideTime">--</td>
      <td id="lowTideHeight">--</td>
    </tr>

    <tr>
      <td>Tide Phase</td>
      <td id="tideType">--</td>
      <td>Moon range</td>
    </tr>
  </table>
</div>

<tr>
<th>Tide</th>
<th>Time</th>
<th>Height</th>
</tr>

<tr>
<td>High Tide</td>
<td id="highTideTime">--</td>
<td id="highTideHeight">--</td>
</tr>

<tr>
<td>Low Tide</td>
<td id="lowTideTime">--</td>
<td id="lowTideHeight">--</td>
</tr>

<tr>
<td>Tide Phase</td>
<td id="tideType">--</td>
<td id="tideRangeNote">--</td>
</tr>

</table>

</div>

</div>

</section>



<script>

const HARBOUR = {
lat:-34.385542,
lon:21.425433
};

const TIDE_API_KEY = "PASTE_YOUR_WORLDTIDES_KEY_HERE";

function showTab(id){

document.querySelectorAll("section").forEach(s=>{
s.style.display="none";
});

document.getElementById(id).style.display="block";

if(id==="weatherTab"){
loadTides();
}

}
async function loadTides(){
  const tideBox = document.getElementById("tideBox");

  const highTideTime = document.getElementById("highTideTime");
  const highTideHeight = document.getElementById("highTideHeight");
  const lowTideTime = document.getElementById("lowTideTime");
  const lowTideHeight = document.getElementById("lowTideHeight");
  const tideType = document.getElementById("tideType");

  if(!TIDE_API_KEY || TIDE_API_KEY.includes("PASTE_YOUR_WORLDTIDES_KEY_HERE")){
    tideBox.innerHTML = `
      <b>High Tide:</b> Add WorldTides API key<br>
      <b>Low Tide:</b> Add WorldTides API key<br>
      <b>Next Tide:</b> Add WorldTides API key
    `;
    if(highTideTime) highTideTime.textContent = "--";
    if(highTideHeight) highTideHeight.textContent = "--";
    if(lowTideTime) lowTideTime.textContent = "--";
    if(lowTideHeight) lowTideHeight.textContent = "--";
    if(tideType) tideType.textContent = "Add API key";
    return;
  }

  try{
    const url = `https://www.worldtides.info/api/v3?heights&extremes&lat=${HARBOUR.lat}&lon=${HARBOUR.lon}&days=1&key=${TIDE_API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    const extremes = data.extremes || [];
    if(!extremes.length){
      tideBox.innerHTML = "No tide data returned.";
      if(highTideTime) highTideTime.textContent = "--";
      if(highTideHeight) highTideHeight.textContent = "--";
      if(lowTideTime) lowTideTime.textContent = "--";
      if(lowTideHeight) lowTideHeight.textContent = "--";
      if(tideType) tideType.textContent = "No data";
      return;
    }

    const now = Date.now();
    const next = extremes.find(t => (t.dt * 1000) > now);
    const highs = extremes.filter(t => t.type === "High");
    const lows = extremes.filter(t => t.type === "Low");
    const fmt = unix => new Date(unix * 1000).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});

    const high = highs[0] || null;
    const low = lows[0] || null;

    tideBox.innerHTML = `
      <b>High Tide:</b> ${high ? fmt(high.dt) : "--"}${high?.height ? ` (${high.height.toFixed(1)} m)` : ""}<br>
      <b>Low Tide:</b> ${low ? fmt(low.dt) : "--"}${low?.height ? ` (${low.height.toFixed(1)} m)` : ""}<br>
      <b>Next Tide:</b> ${next ? `${next.type} at ${fmt(next.dt)}` : "--"}
    `;

    if(highTideTime) highTideTime.textContent = high ? fmt(high.dt) : "--";
    if(highTideHeight) highTideHeight.textContent = high?.height ? `${high.height.toFixed(1)} m` : "--";

    if(lowTideTime) lowTideTime.textContent = low ? fmt(low.dt) : "--";
    if(lowTideHeight) lowTideHeight.textContent = low?.height ? `${low.height.toFixed(1)} m` : "--";

    let tidePhase = "--";
    if(high?.height != null && low?.height != null){
      const range = Math.abs(high.height - low.height);
      tidePhase = range < 1.0 ? "Neap Tide" : range > 1.8 ? "Spring Tide" : "Mid Tide";
    }
    if(tideType) tideType.textContent = tidePhase;

  }catch(err){
    tideBox.innerHTML = "Could not load tide times.";
    if(highTideTime) highTideTime.textContent = "--";
    if(highTideHeight) highTideHeight.textContent = "--";
    if(lowTideTime) lowTideTime.textContent = "--";
    if(lowTideHeight) lowTideHeight.textContent = "--";
    if(tideType) tideType.textContent = "Error";
    console.log(err);
  }
}

showTab("weatherTab");

</script>


</body>
</html>
