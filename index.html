<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tanya Deep Sea V45 Stable</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#061225" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root{
      --bg:#061225;
      --card:#0f1c38;
      --card2:#081632;
      --accent:#2fa4ff;
      --text:#ffffff;
      --muted:#9fb0d0;
      --danger:#ff5c5c;
      --ok:#39d98a;
      --reef:#ffd166;
      --spot:#59d0ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(#061225,#081b3d);
      color:var(--text);
      padding:16px;
    }
    h1{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:22px;
      margin:0 0 12px;
    }
    .topnav{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .navbtn{
      background:#0f1c38;
      border:none;
      padding:9px 12px;
      border-radius:8px;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }
    .navbtn.active{
      background:var(--accent);
      color:#001420;
    }
    .card{
      background:var(--card);
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
    }
    label{
      display:block;
      font-size:12px;
      margin-top:10px;
      color:var(--muted);
    }
    input,select,textarea{
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:var(--card2);
      color:#fff;
      box-sizing:border-box;
    }
    textarea{
      min-height:72px;
      resize:vertical;
    }
    button{
      margin-top:10px;
      background:var(--accent);
      border:none;
      padding:10px;
      border-radius:8px;
      color:#001420;
      font-weight:bold;
      cursor:pointer;
    }
    button.dark{
      background:#132447;
      color:#fff;
    }
    button.danger{
      background:var(--danger);
      color:#fff;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .row>*{
      flex:1;
      min-width:0;
    }
    .mini{
      font-size:12px;
      color:var(--muted);
    }
    .chip{
      display:inline-block;
      background:var(--card2);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      margin:4px 4px 0 0;
    }
    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
    section{display:none}
    #map{
      height:430px;
      border-radius:12px;
      overflow:hidden;
    }
    img.photo{
      width:100%;
      border-radius:12px;
      margin-top:10px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      font-size:12px;
    }
    th,td{
      padding:8px;
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:left;
    }
  </style>
</head>
<body>

  <h1>
    <img src="./icon-192.png" width="30" height="30" style="border-radius:8px;" alt="boat icon">
    Tanya Deep Sea V45 Stable
  </h1>

  <div class="topnav">
    <button class="navbtn" id="btnAdd" onclick="showTab('add')">Add Catch</button>
    <button class="navbtn" id="btnMap" onclick="showTab('mapTab')">Map</button>
    <button class="navbtn" id="btnSpots" onclick="showTab('spots')">Saved Spots</button>
    <button class="navbtn" id="btnLog" onclick="showTab('log')">Log</button>
    <button class="navbtn" id="btnStats" onclick="showTab('stats')">Stats</button>
    <button class="navbtn" id="btnFish" onclick="showTab('fishid')">Fish Helper</button>
  </div>

  <section id="add">
    <div class="card">
      <b>Add Catch</b>

      <label>Species</label>
      <select id="species">
        <option value="">Choose...</option>
        <option>Cape Kob</option>
        <option>Yellowtail</option>
        <option>Bonito</option>
        <option>Red Roman</option>
        <option>Snapper</option>
        <option>Silverfish</option>
        <option>Red Steenbras</option>
        <option>Yellow Belly</option>
        <option>Galjoen</option>
        <option>Hottentot</option>
      </select>

      <label>Length (cm)</label>
      <input id="length" inputmode="numeric">

      <label>Minimum Size</label>
      <input id="minSize" readonly>
      <div id="sizeNote" class="mini">Choose species to load legal size.</div>

      <label>Bait Used</label>
      <input id="bait">

      <label>Automatic Nearest Spot</label>
      <input id="autoSpot" readonly>

      <label>Manual Spot Choice</label>
      <select id="manualSpotPick">
        <option value="">Choose spot manually</option>
      </select>

      <label>Coordinates</label>
      <div class="row">
        <input id="coords" readonly>
        <button type="button" onclick="getGPS()">Get GPS</button>
        <button type="button" class="dark" onclick="showTab('mapTab')">Open Map</button>
      </div>

      <label>Where Caught</label>
      <input id="place" value="Deep Sea" readonly>

      <label>Local Area Name</label>
      <input id="localArea" placeholder="Example: Skulpbank / Blinde Rif / West Reef">

      <div class="row">
        <div class="chip" id="chipWind">Wind: —</div>
        <div class="chip" id="chipSwell">Swell: —</div>
        <div class="chip" id="chipTemp">Sea Temp: —</div>
        <div class="chip" id="chipCurrent">Current: —</div>
      </div>

      <label>Photo</label>
      <input id="photo" type="file" accept="image/*">
      <div class="mini">Choose from camera or gallery</div>
      <div id="photoPreview"></div>

      <label>Notes</label>
      <textarea id="notes"></textarea>

      <div class="row">
        <button id="saveCatchBtn" style="font-size:16px;padding:14px;" onclick="saveCatch()">SAVE CATCH</button>
        <button class="dark" onclick="clearCatchForm()">Clear</button>
      </div>
    </div>
  </section>

  <section id="mapTab">
    <div class="card">
      <div class="row">
        <button onclick="toggleSatellite()">Satellite ON/OFF</button>
        <button class="dark" onclick="toggleReefOverlay()">Show Reef Areas</button>
        <button class="dark" onclick="clearRouteLine()">Clear Route</button>
      </div>
      <div class="mini" style="margin-top:8px;">
        Tap the map to save a Reef or Spot.
      </div>
    </div>
    <div id="map"></div>
  </section>

  <section id="spots">
    <div class="card">
      <div class="row">
        <div><b>Saved Spots</b></div>
        <button onclick="saveSpotFromCoords()">Save Current Spot</button>
      </div>
    </div>
    <div id="spotsList"></div>
  </section>

  <section id="log">
    <div class="card">
      <div class="row">
        <div><b>Catch Log</b></div>
        <button class="danger" onclick="resetAll()">Delete All</button>
      </div>
    </div>
    <div id="catchList"></div>
  </section>

  <section id="stats">
    <div class="card">
      <b>Stats Summary</b>
      <div id="statsBox" style="margin-top:10px;"></div>
    </div>
  </section>

  <section id="fishid">
    <div class="card">
      <b>Fish Photo Helper</b>

      <label>Fish Photo</label>
      <input type="file" id="fishIdPhoto" accept="image/*">
      <div class="mini">Choose from camera or gallery</div>
      <div id="fishIdPreview"></div>

      <label>Species</label>
      <select id="fishIdSpecies">
        <option value="">Choose...</option>
        <option>Cape Kob</option>
        <option>Yellowtail</option>
        <option>Bonito</option>
        <option>Red Roman</option>
        <option>Snapper</option>
        <option>Silverfish</option>
        <option>Red Steenbras</option>
        <option>Yellow Belly</option>
        <option>Galjoen</option>
        <option>Hottentot</option>
      </select>

      <div class="row">
        <button onclick="saveFishHelper()">Save Helper</button>
        <button class="dark" onclick="copyFishToCatch()">Use species in Add Catch</button>
      </div>

      <div id="fishHelpers" style="margin-top:10px;"></div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const KEY_CATCHES = "tanya_deepsea_catches";
    const KEY_SPOTS = "tanya_deepsea_spots";
    const KEY_FISH = "tanya_deepsea_fishhelpers";
    const BASE = { lat:-34.37, lng:20.85 };

    const KNOWN_SPOTS = [
      { id:"s1",  name:"Skulpbank 42m",       type:"Reef", coords:"-34.390500,20.860200" },
      { id:"s2",  name:"North Edge 38m",      type:"Reef", coords:"-34.412000,20.835000" },
      { id:"s3",  name:"Blinde Rif East",     type:"Reef", coords:"-34.401500,20.880100" },
      { id:"s4",  name:"Middle Reef",         type:"Reef", coords:"-34.375000,20.870000" },
      { id:"s5",  name:"South Reef",          type:"Reef", coords:"-34.420000,20.865000" },
      { id:"s6",  name:"West Drift",          type:"Reef", coords:"-34.395500,20.845000" },
      { id:"s7",  name:"Deep Reef",           type:"Reef", coords:"-34.405000,20.895000" },
      { id:"s8",  name:"Inner Bank",          type:"Reef", coords:"-34.382500,20.855000" },
      { id:"s9",  name:"South Deep",          type:"Reef", coords:"-34.430000,20.880000" },
      { id:"s10", name:"Kob Line",            type:"Reef", coords:"-34.388000,20.875000" },
      { id:"s11", name:"North Bank",          type:"Reef", coords:"-34.370000,20.860000" },
      { id:"s12", name:"Roman Reef",          type:"Reef", coords:"-34.410000,20.872000" },
      { id:"s13", name:"Outer Deep",          type:"Reef", coords:"-34.445000,20.900000" },
      { id:"s14", name:"East Drift",          type:"Reef", coords:"-34.398000,20.885000" },
      { id:"s15", name:"Middle Ridge",        type:"Reef", coords:"-34.392500,20.870500" },
      { id:"s16", name:"Far North",           type:"Reef", coords:"-34.360000,20.880000" },
      { id:"s17", name:"West Bank",           type:"Reef", coords:"-34.415000,20.845000" },
      { id:"s18", name:"Southwest Deep",      type:"Reef", coords:"-34.430500,20.835500" },
      { id:"s19", name:"Inner West",          type:"Reef", coords:"-34.375500,20.852500" },
      { id:"s20", name:"Outer Canyon",        type:"Reef", coords:"-34.450000,20.915000" }
    ];

    const MIN_SIZE = {
      "Cape Kob":60,
      "Yellowtail":60,
      "Bonito":0,
      "Red Roman":30,
      "Snapper":30,
      "Silverfish":25,
      "Red Steenbras":60,
      "Yellow Belly":30,
      "Galjoen":35,
      "Hottentot":22
    };

    const species = document.getElementById("species");
    const lengthEl = document.getElementById("length");
    const minSizeEl = document.getElementById("minSize");
    const sizeNote = document.getElementById("sizeNote");
    const baitEl = document.getElementById("bait");
    const coordsEl = document.getElementById("coords");
    const placeEl = document.getElementById("place");
    const localAreaEl = document.getElementById("localArea");
    const autoSpotEl = document.getElementById("autoSpot");
    const manualSpotPick = document.getElementById("manualSpotPick");
    const notesEl = document.getElementById("notes");
    const photoEl = document.getElementById("photo");
    const photoPreview = document.getElementById("photoPreview");
    const chipWind = document.getElementById("chipWind");
    const chipSwell = document.getElementById("chipSwell");
    const chipTemp = document.getElementById("chipTemp");
    const chipCurrent = document.getElementById("chipCurrent");

    let photoData = "";
    let fishPhotoData = "";
    let map, osm, satLayer, satOn = false;
    let catchMarkers = [];
    let spotMarkers = [];
    let reefOverlayMarkers = [];
    let routeLine = null;
    let myBoatMarker = null;
    let tempClickMarker = null;
    let reefOverlayOn = false;

    function parseCoords(str){
      if(!str) return null;
      const p = String(str).split(",").map(x => x.trim());
      if(p.length < 2) return null;
      const lat = Number(p[0]);
      const lng = Number(p[1]);
      if(!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      return {lat,lng};
    }

    function safe(text){
      return String(text || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function getAllCatches(){ return JSON.parse(localStorage.getItem(KEY_CATCHES) || "[]"); }
    function saveAllCatches(v){ localStorage.setItem(KEY_CATCHES, JSON.stringify(v)); }

    function getAllSpots(){ return JSON.parse(localStorage.getItem(KEY_SPOTS) || "[]"); }
    function saveAllSpots(v){ localStorage.setItem(KEY_SPOTS, JSON.stringify(v)); }

    function getFishHelpers(){ return JSON.parse(localStorage.getItem(KEY_FISH) || "[]"); }
    function saveFishHelpers(v){ localStorage.setItem(KEY_FISH, JSON.stringify(v)); }

    function clearLayers(arr){
      if(!map) return;
      arr.forEach(m => {
        try { map.removeLayer(m); } catch {}
      });
      arr.length = 0;
    }

    function loadKnownSpotsIntoSaved(){
      const existing = getAllSpots();
      const existingCoords = new Set(existing.map(s => s.coords));
      KNOWN_SPOTS.forEach(s => {
        if(!existingCoords.has(s.coords)){
          existing.push({ id:s.id, name:s.name, type:s.type, coords:s.coords });
        }
      });
      saveAllSpots(existing);
    }

    function getSpotNameFromCoords(coordStr){
      const s = getAllSpots().find(x => x.coords === coordStr);
      return s ? s.name : "";
    }

    function showTab(id){
      document.querySelectorAll("section").forEach(s => s.style.display = "none");
      const section = document.getElementById(id);
      if(section) section.style.display = "block";

      document.querySelectorAll(".navbtn").forEach(b => b.classList.remove("active"));
      const mapIds = {
        add:"btnAdd",
        mapTab:"btnMap",
        spots:"btnSpots",
        log:"btnLog",
        stats:"btnStats",
        fishid:"btnFish"
      };
      const btn = document.getElementById(mapIds[id]);
      if(btn) btn.classList.add("active");

      fillSpotPick();

      if(id === "mapTab"){
        initMap();
        setTimeout(() => {
          map.invalidateSize();
          renderMap();
        }, 200);
      }
      if(id === "spots") renderSpots();
      if(id === "log") renderLog();
      if(id === "stats") renderStats();
      if(id === "fishid") renderFishHelpers();
    }

    function updateMinSize(){
      const v = species.value;
      minSizeEl.value = MIN_SIZE[v] ?? "";
      checkFishSize();
    }

    function checkFishSize(){
      const sp = species.value;
      const len = Number(lengthEl.value);
      const min = MIN_SIZE[sp];

      if(!sp || !len || min === undefined){
        sizeNote.textContent = "Choose species to load legal size.";
        sizeNote.style.color = "#9fb0d0";
        return;
      }

      if(min === 0){
        sizeNote.textContent = "No minimum size for this species.";
        sizeNote.style.color = "#9fb0d0";
        return;
      }

      if(len < min){
        sizeNote.textContent = "⚠️ UNDERSIZE! Minimum is " + min + " cm";
        sizeNote.style.color = "#ff5c5c";
      } else {
        sizeNote.textContent = "✅ Legal size (" + min + " cm)";
        sizeNote.style.color = "#39d98a";
      }
    }

    species.addEventListener("change", updateMinSize);
    lengthEl.addEventListener("input", checkFishSize);

    photoEl.addEventListener("change", () => {
      const file = photoEl.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        photoData = reader.result;
        photoPreview.innerHTML = `<img class="photo" src="${photoData}" alt="photo">`;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("fishIdPhoto").addEventListener("change", e => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        fishPhotoData = reader.result;
        document.getElementById("fishIdPreview").innerHTML = `<img class="photo" src="${reader.result}" alt="fish">`;
      };
      reader.readAsDataURL(file);
    });

    function fillSpotPick(){
      const spots = getAllSpots();
      const s = document.getElementById("manualSpotPick");
      s.innerHTML = `<option value="">Choose spot manually</option>`;
      spots.forEach(sp => {
        s.innerHTML += `<option value="${sp.coords}">${sp.name}</option>`;
      });
    }

    manualSpotPick.addEventListener("change", function(e){
      const coordStr = e.target.value;
      if(!coordStr) return;

      coordsEl.value = coordStr;

      const s = getAllSpots().find(x => x.coords === coordStr);
      if(s){
        placeEl.value = `Deep Sea • ${s.type} • ${s.name}`;
        autoSpotEl.value = s.name;
      }
    });

    async function estimateCurrentStrength(lat, lon){
      try{
        const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=wind_speed_10m&timezone=Africa%2FJohannesburg`;
        const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&current=wave_height,swell_wave_height,sea_surface_temperature&timezone=Africa%2FJohannesburg`;

        const [wr, mr] = await Promise.all([fetch(weatherUrl), fetch(marineUrl)]);
        const w = await wr.json();
        const m = await mr.json();

        const wind = Number(w?.current?.wind_speed_10m || 0);
        const wave = Number(m?.current?.wave_height || 0);
        const swell = Number(m?.current?.swell_wave_height || 0);

        chipWind.textContent = `Wind: ${wind.toFixed(0)} km/h`;
        chipSwell.textContent = `Swell: ${swell.toFixed(2)} m`;
        chipTemp.textContent = `Sea Temp: ${Number(m?.current?.sea_surface_temperature || 0).toFixed(1)} °C`;

        let current = 0.2;
        current += wind * 0.015;
        current += wave * 0.18;
        current += swell * 0.12;
        chipCurrent.textContent = `Current: ${current.toFixed(2)} kt`;
      }catch{
        chipWind.textContent = "Wind: —";
        chipSwell.textContent = "Swell: —";
        chipTemp.textContent = "Sea Temp: —";
        chipCurrent.textContent = "Current: —";
      }
    }

    async function getGPS(){
      if(!navigator.geolocation){
        alert("GPS not supported on this device");
        return;
      }

      navigator.geolocation.getCurrentPosition(async pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        coordsEl.value = lat.toFixed(6) + "," + lng.toFixed(6);

        if(map){
          if(myBoatMarker) map.removeLayer(myBoatMarker);
          myBoatMarker = L.marker([lat,lng]).addTo(map);
          myBoatMarker.bindPopup("Your Boat").openPopup();
          map.setView([lat,lng],13);
        }

        await estimateCurrentStrength(lat, lng);

        const nearest = getNearestSpot(lat, lng);
        if(nearest){
          autoSpotEl.value = nearest.name;
          placeEl.value = `Deep Sea • ${nearest.type} • ${nearest.name}`;
        } else {
          autoSpotEl.value = "";
          placeEl.value = "Deep Sea";
        }
      }, () => {
        alert("Could not get GPS location");
      }, {
        enableHighAccuracy:true,
        timeout:10000
      });
    }

    function getNearestSpot(lat, lng){
      const spots = getAllSpots();
      let best = null;
      let bestDist = Infinity;

      spots.forEach(s => {
        const p = parseCoords(s.coords);
        if(!p) return;
        const d = Math.hypot(lat - p.lat, lng - p.lng);
        if(d < bestDist){
          bestDist = d;
          best = s;
        }
      });

      return bestDist < 0.05 ? best : null;
    }

    function saveCatch(){
      const sp = species.value;
      const len = Number(lengthEl.value);
      const coords = coordsEl.value;

      if(!sp){
        alert("Choose species");
        return;
      }
      if(!coords){
        alert("Get GPS or choose a spot first");
        return;
      }

      const min = MIN_SIZE[sp] || 0;
      if(min > 0 && len < min){
        const ok = confirm("⚠️ This fish is undersize (" + len + " cm).\nMinimum is " + min + " cm.\n\nSave anyway?");
        if(!ok) return;
      }

      const list = getAllCatches();
      list.push({
        id: Date.now(),
        species: sp,
        length: len,
        min: minSizeEl.value,
        bait: baitEl.value,
        coords: coords,
        place: placeEl.value,
        spotName: getSpotNameFromCoords(coords),
        localArea: localAreaEl.value,
        notes: notesEl.value,
        photo: photoData || "",
        date: new Date().toLocaleDateString()
      });

      saveAllCatches(list);
      alert("Catch saved");
      clearCatchForm();
      renderLog();
      renderStats();
      renderMap();
    }

    function clearCatchForm(){
      species.value = "";
      lengthEl.value = "";
      minSizeEl.value = "";
      baitEl.value = "";
      coordsEl.value = "";
      placeEl.value = "Deep Sea";
      localAreaEl.value = "";
      notesEl.value = "";
      photoEl.value = "";
      photoData = "";
      photoPreview.innerHTML = "";
      autoSpotEl.value = "";
      manualSpotPick.value = "";
      chipWind.textContent = "Wind: —";
      chipSwell.textContent = "Swell: —";
      chipTemp.textContent = "Sea Temp: —";
      chipCurrent.textContent = "Current: —";
      sizeNote.textContent = "Choose species to load legal size.";
      sizeNote.style.color = "#9fb0d0";
    }

    function renderLog(){
      const box = document.getElementById("catchList");
      const list = getAllCatches().slice().reverse();
      box.innerHTML = "";

      if(!list.length){
        box.innerHTML = `<div class="card">No catches saved yet.</div>`;
        return;
      }

      list.forEach(c => {
        box.innerHTML += `
          <div class="card">
            <b>${safe(c.species)}</b><br>
            <div class="mini">${safe(c.length)} cm • Min ${safe(c.min)}</div>
            <div class="mini">${safe(c.place)}</div>
            ${c.localArea ? `<div class="mini">Area: ${safe(c.localArea)}</div>` : ""}
            <div class="mini mono">📍 ${safe(c.coords)}</div>
            ${c.bait ? `<div class="mini">Bait: ${safe(c.bait)}</div>` : ""}
            ${c.notes ? `<div class="mini">Notes: ${safe(c.notes)}</div>` : ""}
            <div class="mini">${safe(c.date)}</div>
            ${c.photo ? `<img class="photo" src="${c.photo}" alt="fish">` : ""}
            <div class="row">
              <button onclick="useLogCoords('${safe(c.coords)}')">Use Log</button>
              <button class="dark" onclick="editCatch('${c.id}')">Edit</button>
              <button class="danger" onclick="deleteCatch('${c.id}')">Delete</button>
            </div>
          </div>
        `;
      });
    }

    function useLogCoords(coordStr){
      const p = parseCoords(coordStr);
      if(!p){
        alert("No valid coordinates in this log entry.");
        return;
      }

      coordsEl.value = coordStr;
      showTab("mapTab");

      setTimeout(() => {
        map.setView([p.lat, p.lng], 15);
        if(tempClickMarker) map.removeLayer(tempClickMarker);
        tempClickMarker = L.marker([p.lat, p.lng]).addTo(map);

        if(!satOn){
          satOn = true;
          map.removeLayer(osm);
          satLayer.addTo(map);
        }
      }, 250);
    }

    function editCatch(id){
      const list = getAllCatches();
      const c = list.find(x => String(x.id) === String(id));
      if(!c) return;

      species.value = c.species || "";
      updateMinSize();
      lengthEl.value = c.length || "";
      minSizeEl.value = c.min || "";
      baitEl.value = c.bait || "";
      coordsEl.value = c.coords || "";
      placeEl.value = c.place || "Deep Sea";
      localAreaEl.value = c.localArea || "";
      notesEl.value = c.notes || "";
      photoData = c.photo || "";
      photoPreview.innerHTML = c.photo ? `<img class="photo" src="${c.photo}" alt="fish">` : "";

      saveAllCatches(list.filter(x => String(x.id) !== String(id)));
      showTab("add");
    }

    function deleteCatch(id){
      const ok = confirm("Delete this catch?");
      if(!ok) return;
      saveAllCatches(getAllCatches().filter(c => String(c.id) !== String(id)));
      renderLog();
      renderStats();
      renderMap();
    }

    function renderStats(){
      const box = document.getElementById("statsBox");
      const list = getAllCatches();

      if(!list.length){
        box.innerHTML = "No catches yet.";
        return;
      }

      const bySpecies = {};
      const bySpot = {};

      list.forEach(c => {
        if(c.species){
          if(!bySpecies[c.species]) bySpecies[c.species] = [];
          bySpecies[c.species].push(c);
        }

        const spotKey = c.localArea || c.spotName || c.place || c.coords || "Unknown";
        bySpot[spotKey] = (bySpot[spotKey] || 0) + 1;
      });

      let html = `<div class="card"><b>Species Summary</b>`;
      Object.keys(bySpecies).forEach(sp => {
        html += `<div class="mini">${safe(sp)} — ${bySpecies[sp].length} catches</div>`;
      });
      html += `</div>`;

      const bestSpots = Object.entries(bySpot)
        .filter(([name,count]) => name && count > 0)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,5);

      html += `<div class="card"><b>Best Spots</b>`;
      if(bestSpots.length){
        bestSpots.forEach(([spot,count]) => {
          html += `<div class="mini">${safe(spot)} — ${count} catches</div>`;
        });
      } else {
        html += `<div class="mini">No spot data yet.</div>`;
      }
      html += `</div>`;

      box.innerHTML = html;
    }

    function initMap(){
      if(map) return;

      map = L.map("map").setView([BASE.lat, BASE.lng], 10);

      osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
      satLayer = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 19 }
      );

      map.on("click", e => {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);

        coordsEl.value = lat + "," + lng;

        if(tempClickMarker) map.removeLayer(tempClickMarker);
        tempClickMarker = L.marker([lat, lng]).addTo(map);
        map.setView([lat, lng], 15);

        const autoName = `Spot ${lat}, ${lng}`;
        const name = prompt("Spot name?", autoName);
        if(name === null) return;

        const type = prompt("Type: Reef or Spot?", "Reef");
        if(type === null) return;

        const spots = getAllSpots();
        spots.push({
          id: Date.now(),
          name: name.trim() || autoName,
          type: type.trim() || "Spot",
          coords: lat + "," + lng
        });

        saveAllSpots(spots);
        fillSpotPick();
        renderSpots();
        renderMap();
      });
    }

    function renderMap(){
      if(!map) return;

      clearLayers(catchMarkers);
      clearLayers(spotMarkers);
      clearLayers(reefOverlayMarkers);

      getAllCatches().forEach(c => {
        const p = parseCoords(c.coords);
        if(!p) return;
        const m = L.marker([p.lat, p.lng]).addTo(map);
        m.bindPopup(`<b>${safe(c.species)}</b><br>${safe(c.coords || "")}`);
        catchMarkers.push(m);
      });

      getAllSpots().forEach(s => {
        const p = parseCoords(s.coords);
        if(!p) return;
        const m = L.circleMarker([p.lat, p.lng], {
          radius:8,
          color:s.type==="Reef" ? "#ffd166" : "#59d0ff",
          weight:2,
          fillOpacity:0.6
        }).addTo(map);

        m.bindPopup(`
          <b>${safe(s.type)} • ${safe(s.name)}</b><br>
          <span class="mini mono">${safe(s.coords)}</span><br><br>
          <button onclick="navigateToSpot('${p.lat}','${p.lng}')">Navigate</button>
        `);
        spotMarkers.push(m);
      });

      if(reefOverlayOn) renderReefOverlay();
    }

    function toggleSatellite(){
      if(!map) return;
      satOn = !satOn;
      if(satOn){
        if(map.hasLayer(osm)) map.removeLayer(osm);
        satLayer.addTo(map);
      } else {
        if(map.hasLayer(satLayer)) map.removeLayer(satLayer);
        osm.addTo(map);
      }
    }

    function clearRouteLine(){
      if(routeLine && map){
        map.removeLayer(routeLine);
        routeLine = null;
      }
      if(myBoatMarker && map){
        map.removeLayer(myBoatMarker);
        myBoatMarker = null;
      }
    }

    function navigateToSpot(lat, lng){
      navigator.geolocation.getCurrentPosition(pos => {
        const myLat = pos.coords.latitude;
        const myLng = pos.coords.longitude;

        clearRouteLine();

        myBoatMarker = L.marker([myLat,myLng]).addTo(map);
        routeLine = L.polyline([
          [myLat,myLng],
          [Number(lat),Number(lng)]
        ], { color:"red", weight:4 }).addTo(map);

        map.setView([Number(lat),Number(lng)], 13);
      }, () => {
        alert("Could not get current location for route.");
      });
    }

    function saveSpotFromCoords(){
      const c = coordsEl.value;
      if(!c){
        alert("Choose a spot on the map or get GPS first.");
        return;
      }

      const p = parseCoords(c);
      if(!p){
        alert("Invalid coordinates.");
        return;
      }

      const autoName = `Spot ${p.lat.toFixed(3)}, ${p.lng.toFixed(3)}`;
      const name = prompt("Spot name?", autoName);
      if(name === null) return;

      const type = prompt("Type: Reef or Spot?", "Reef");
      if(type === null) return;

      const spots = getAllSpots();
      spots.push({
        id: Date.now(),
        name: name.trim() || autoName,
        type: type.trim() || "Spot",
        coords: c
      });

      saveAllSpots(spots);
      fillSpotPick();
      renderSpots();
      renderMap();
    }

    function renderSpots(){
      const box = document.getElementById("spotsList");
      const spots = getAllSpots().slice().reverse();
      box.innerHTML = "";

      if(!spots.length){
        box.innerHTML = `<div class="card">No saved spots yet.</div>`;
        return;
      }

      spots.forEach(s => {
        const p = parseCoords(s.coords);
        box.innerHTML += `
          <div class="card">
            <b>${safe(s.type)} • ${safe(s.name)}</b>
            <div class="mini mono">📍 ${safe(s.coords)}</div>
            <div class="row">
              <button onclick="goToSpotOnMap('${safe(s.coords)}')">Open on Map</button>
              <button class="dark" onclick="useSpotCoords('${safe(s.coords)}','${safe(s.name)}','${safe(s.type)}')">Use Spot</button>
              <button class="dark" onclick="navigateToSpot('${p.lat}','${p.lng}')">Navigate</button>
              <button class="danger" onclick="deleteSpot('${s.id}')">Delete</button>
            </div>
          </div>
        `;
      });
    }

    function goToSpotOnMap(coordStr){
      const p = parseCoords(coordStr);
      if(!p) return;
      showTab("mapTab");
      setTimeout(() => {
        map.setView([p.lat,p.lng], 15);
        if(tempClickMarker) map.removeLayer(tempClickMarker);
        tempClickMarker = L.marker([p.lat,p.lng]).addTo(map);
      }, 200);
    }

    function useSpotCoords(coordStr, name, type){
      coordsEl.value = coordStr;
      placeEl.value = `Deep Sea • ${type} • ${name}`;
      autoSpotEl.value = name;
      manualSpotPick.value = coordStr;
      showTab("add");
    }

    function deleteSpot(id){
      const ok = confirm("Delete this spot?");
      if(!ok) return;
      saveAllSpots(getAllSpots().filter(s => String(s.id) !== String(id)));
      fillSpotPick();
      renderSpots();
      renderMap();
    }

    function toggleReefOverlay(){
      reefOverlayOn = !reefOverlayOn;
      renderMap();
    }

    function renderReefOverlay(){
      const spots = getAllSpots().filter(s => s.type === "Reef");
      spots.forEach(s => {
        const p = parseCoords(s.coords);
        if(!p) return;

        const m = L.circle([p.lat, p.lng], {
          radius: 350,
          color: "#ffd166",
          weight: 1,
          fillColor: "#ffd166",
          fillOpacity: 0.12
        }).addTo(map);

        reefOverlayMarkers.push(m);
      });
    }

    function saveFishHelper(){
      const sp = document.getElementById("fishIdSpecies").value;
      if(!sp && !fishPhotoData){
        alert("Choose a photo or species first.");
        return;
      }

      const list = getFishHelpers();
      list.unshift({
        id: Date.now(),
        species: sp || "Unknown",
        photo: fishPhotoData || ""
      });

      saveFishHelpers(list.slice(0,20));
      renderFishHelpers();
    }

    function renderFishHelpers(){
      const box = document.getElementById("fishHelpers");
      const list = getFishHelpers();
      box.innerHTML = "";

      if(!list.length){
        box.innerHTML = `<div class="mini">No saved helpers yet.</div>`;
        return;
      }

      list.forEach(item => {
        box.innerHTML += `
          <div class="card">
            <b>${safe(item.species || "Unknown")}</b>
            ${item.photo ? `<img class="photo" src="${item.photo}" alt="helper">` : ""}
            <div class="row">
              <button onclick="useFishHelper('${item.id}')">Use in Add Catch</button>
              <button class="danger" onclick="deleteFishHelper('${item.id}')">Delete</button>
            </div>
          </div>
        `;
      });
    }

    function useFishHelper(id){
      const item = getFishHelpers().find(x => String(x.id) === String(id));
      if(!item) return;

      species.value = item.species || "";
      updateMinSize();

      if(item.photo){
        photoData = item.photo;
        photoPreview.innerHTML = `<img class="photo" src="${item.photo}" alt="fish">`;
      }

      showTab("add");
    }

    function deleteFishHelper(id){
      saveFishHelpers(getFishHelpers().filter(x => String(x.id) !== String(id)));
      renderFishHelpers();
    }

    function copyFishToCatch(){
      const sp = document.getElementById("fishIdSpecies").value;
      if(!sp) return;
      species.value = sp;
      updateMinSize();
      showTab("add");
    }

    function resetAll(){
      const ok = confirm("Delete all catches and custom spots?");
      if(!ok) return;
      localStorage.removeItem(KEY_CATCHES);
      localStorage.removeItem(KEY_SPOTS);
      localStorage.removeItem(KEY_FISH);
      loadKnownSpotsIntoSaved();
      renderLog();
      renderSpots();
      renderStats();
      renderMap();
      renderFishHelpers();
      fillSpotPick();
    }

    loadKnownSpotsIntoSaved();
    fillSpotPick();
    updateMinSize();
    showTab("add");
    initMap();
    renderLog();
    renderSpots();
    renderStats();
  </script>

  <script>
    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
