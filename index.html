<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanya Deep Sea V70 Stable</title>

<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#061225">

<style>

body{
font-family:Arial;
margin:0;
background:#061225;
color:white;
padding:15px;
}

h1{
margin:0 0 10px;
}

.topnav{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:10px;
}

.navbtn{
background:#0f1c38;
border:none;
padding:10px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

.navbtn.active{
background:#2fa4ff;
color:#001420;
}

.card{
background:#0f1c38;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:4px;
border-radius:6px;
border:none;
background:#081632;
color:white;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#2fa4ff;
color:#001420;
font-weight:bold;
cursor:pointer;
}

section{
display:none;
}

.threatBadge{
padding:4px 8px;
border-radius:8px;
font-size:12px;
font-weight:bold;
}

.open{
background:#39d98a;
color:black;
}

.closed{
background:#ff5c5c;
}

.check{
background:#ffd166;
color:black;
}

</style>
</head>

<body>

<h1>🎣 Tanya Deep Sea V70</h1>

<div class="topnav">

<button class="navbtn" onclick="showTab('add')">Add Catch</button>
<button class="navbtn" onclick="showTab('log')">Log</button>
<button class="navbtn" onclick="showTab('spots')">Spots</button>
<button class="navbtn" onclick="showTab('season')">Season</button>
<button class="navbtn" onclick="showTab('drift')">Drift</button>

</div>


<!-- ADD CATCH -->

<section id="add">

<div class="card">

<b>Add Catch</b>

<label>Species</label>

<select id="species">

<option value="">Choose...</option>

<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Silverfish</option>
<option>Red Steenbras</option>
<option>Yellow Belly</option>
<option>Galjoen</option>
<option>Hottentot</option>

</select>

<div id="seasonWarn"></div>

<label>Length</label>
<input id="length">

<label>Bait Used</label>
<input id="bait">

<label>Local Area</label>
<input id="localArea">

<label>Coordinates</label>
<input id="coords">

<label>Notes</label>
<textarea id="notes"></textarea>

<button onclick="saveCatch()">SAVE CATCH</button>

</div>

</section>


<!-- LOG -->

<section id="log">

<div class="card">
<b>Catch Log</b>
</div>

<div id="logBox"></div>

</section>


<!-- SPOTS -->

<section id="spots">

<div class="card">
<b>Saved Spots</b>
</div>

<div id="spotsBox"></div>

</section>


<!-- SEASON -->

<section id="season">

<div class="card">
<b>Fish Season Guide</b>
</div>

<div id="seasonBox"></div>

</section>


<!-- DRIFT -->

<section id="drift">

<div class="card">

<b>🌊 Drift Advice</b>

<div id="driftBox">

Best method:

<ul>

<li>Pelagic fish → Drift</li>
<li>Reef fish → Anchor</li>
<li>Find fish drifting then anchor</li>

</ul>

</div>

</div>

</section>



<script>

const KEY_CATCH="tanya_catches"
const KEY_SPOTS="tanya_spots"



const SPECIES_BAIT={
"Cape Kob":"Pilchard + Chokka",
"Yellowtail":"Live Makriel",
"Bonito":"Metal Spoon",
"Red Roman":"Chokka",
"Snapper":"Chokka",
"Silverfish":"Chokka",
"Red Steenbras":"Chokka + Pilchard",
"Yellow Belly":"Pilchard",
"Galjoen":"Red Bait",
"Hottentot":"Chokka"
}



const SPECIES_SEASON={
"Cape Kob":{best:"Spring-Autumn",closed:"None"},
"Yellowtail":{best:"Summer-Autumn",closed:"None"},
"Bonito":{best:"Summer",closed:"None"},
"Red Roman":{best:"All year",closed:"None"},
"Snapper":{best:"All year",closed:"None"},
"Silverfish":{best:"All year",closed:"None"},
"Red Steenbras":{best:"Winter",closed:"1 Sep - 30 Nov"},
"Yellow Belly":{best:"All year",closed:"None"},
"Galjoen":{best:"Winter",closed:"15 Oct - end Feb"},
"Hottentot":{best:"All year",closed:"None"}
}



function showTab(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}



function autoBait(){

const sp=species.value

bait.value=SPECIES_BAIT[sp]||""

renderSeasonWarning()

}



species.addEventListener("change",autoBait)



function renderSeasonWarning(){

const sp=species.value

const box=document.getElementById("seasonWarn")

if(!sp){box.innerHTML="";return}

const season=SPECIES_SEASON[sp]

let warn=""

if(season.closed!=="None"){

warn=`<span class="threatBadge check">Closed: ${season.closed}</span>`

}

else{

warn=`<span class="threatBadge open">Open Season</span>`

}

box.innerHTML=warn

}



function getCatches(){

return JSON.parse(localStorage.getItem(KEY_CATCH)||"[]")

}



function saveCatches(d){

localStorage.setItem(KEY_CATCH,JSON.stringify(d))

}



function getSpots(){

return JSON.parse(localStorage.getItem(KEY_SPOTS)||"[]")

}



function saveSpots(d){

localStorage.setItem(KEY_SPOTS,JSON.stringify(d))

}



function saveCatch(){

const sp=species.value

const coords=coords.value

const area=localArea.value

if(!sp||!coords){alert("Fill species and coords");return}



let catches=getCatches()

catches.push({

species:sp,

coords:coords,

area:area,

bait:bait.value,

notes:notes.value,

date:new Date().toLocaleDateString()

})

saveCatches(catches)



autoSaveSpot()

renderLog()

renderSpots()

alert("Catch saved")

}



function autoSaveSpot(){

const coords=coords.value

const area=localArea.value

if(!coords||!area)return



let spots=getSpots()



if(!spots.find(s=>s.coords===coords)){

spots.push({

name:area,

coords:coords

})

saveSpots(spots)

}

}



function renderLog(){

const box=document.getElementById("logBox")

box.innerHTML=""

getCatches().reverse().forEach(c=>{

box.innerHTML+=`

<div class="card">

<b>${c.species}</b>

<div>${c.coords}</div>

<div>${c.area}</div>

<div>${c.date}</div>

</div>

`

})

}



function renderSpots(){

const box=document.getElementById("spotsBox")

box.innerHTML=""

getSpots().forEach(s=>{

box.innerHTML+=`

<div class="card">

<b>${s.name}</b>

<div>${s.coords}</div>

</div>

`

})

}



function renderSeason(){

const box=document.getElementById("seasonBox")

box.innerHTML=""

Object.keys(SPECIES_SEASON).forEach(sp=>{

const s=SPECIES_SEASON[sp]

box.innerHTML+=`

<div class="card">

<b>${sp}</b>

<div>Best: ${s.best}</div>

<div>Closed: ${s.closed}</div>

</div>

`

})

}



renderSeason()
renderLog()
renderSpots()

showTab("add")

</script>

</body>
</html>
