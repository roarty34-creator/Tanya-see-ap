<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tanya Deep Sea V33</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#061225">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --bg:#061225;
  --card:#0f1c38;
  --accent:#2fa4ff;
  --text:#ffffff;
  --muted:#8aa0c9;
  --danger:#ff5c5c;
  --ok:#39d98a;
  --warn:#ffd166;
}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(#061225,#081b3d);
  color:var(--text);
  padding:16px;
}
h1{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:22px;
  margin:0 0 10px;
}
.topnav{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.navbtn{
  background:#0f1c38;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  color:white;
  font-weight:bold;
}
.navbtn.active{
  background:#2fa4ff;
  color:#02111f;
}
.card{
  background:#0f1c38;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}
label{
  display:block;
  font-size:12px;
  margin-top:10px;
  color:var(--muted);
}
input,select,textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#081632;
  color:white;
  box-sizing:border-box;
}
textarea{
  min-height:70px;
  resize:vertical;
}
button{
  margin-top:10px;
  background:#2fa4ff;
  border:none;
  padding:10px;
  border-radius:8px;
  color:#001420;
  font-weight:bold;
}
button.dark{
  background:#0f1c38;
  color:white;
}
button.danger{
  background:#ff5c5c;
  color:white;
}
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.row > *{
  flex:1;
}
section{
  display:none;
}
#map{
  height:430px;
  border-radius:12px;
}
img.photo{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}
.mini{
  font-size:12px;
  color:var(--muted);
}
.chip{
  display:inline-block;
  background:#081632;
  color:white;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  margin:4px 4px 0 0;
}
.good{color:#b8ffd8}
.warn{color:#ffe8a6}
.bad{color:#ffd4d4}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
@media(max-width:700px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<h1>
  <img src="icon-192.png" width="30" height="30" style="border-radius:8px;">
  Tanya Deep Sea V33
</h1>

<div class="topnav">
  <button class="navbtn" id="btnAdd" onclick="showTab('add')">Add Catch</button>
  <button class="navbtn" id="btnMap" onclick="showTab('mapTab')">Map</button>
  <button class="navbtn" id="btnLog" onclick="showTab('log')">Log</button>
  <button class="navbtn" id="btnStats" onclick="showTab('stats')">Stats</button>
  <button class="navbtn" id="btnSea" onclick="showTab('sea')">Sea</button>
  <button class="navbtn" id="btnFish" onclick="showTab('fishid')">Fish ID</button>
</div>

<section id="add">
  <div class="card">
    <label>Species</label>
    <select id="species">
      <option value="">Choose...</option>
      <option>Cape Kob</option>
      <option>Yellowtail</option>
      <option>Bonito</option>
      <option>Red Roman</option>
      <option>Snapper</option>
      <option>Silverfish</option>
      <option>Red Steenbras</option>
      <option>Yellow Belly</option>
      <option>Galjoen</option>
      <option>Hottentot</option>
    </select>

    <label>Length (cm)</label>
    <input id="length">

    <label>Minimum Size</label>
    <input id="minSize" readonly>

    <div id="sizeNote" class="mini">Choose species to load legal size.</div>

    <label>Depth (m)</label>
    <input id="depth">

    <label>Bait Used</label>
    <input id="bait">

    <label>Coordinates</label>
    <input id="coords" readonly>

    <div class="row">
      <button onclick="getGPS()">Get GPS</button>
      <button class="dark" onclick="fillFromSelectedSpot()">Use Selected Spot</button>
    </div>

    <label>Saved Spot</label>
    <select id="spotSelect">
      <option value="">None</option>
    </select>

    <label>Photo</label>
    <input type="file" id="photo" accept="image/*">

    <div id="photoPreview"></div>

    <label>Notes</label>
    <textarea id="notes"></textarea>

    <div class="row">
      <button onclick="saveCatch()">Save Catch</button>
      <button class="dark" onclick="clearCatchForm()">Clear</button>
    </div>
  </div>
</section>

<section id="mapTab">
  <div class="card">
    <div class="row">
      <button onclick="toggleSatellite()">Satellite ON/OFF</button>
      <button class="dark" onclick="centerOnStilbaai()">Stilbaai</button>
    </div>
    <div class="mini" style="margin-top:8px;">
      Tap map to save a Reef or Spot.
    </div>
  </div>
  <div id="map"></div>
</section>

<section id="log">
  <div id="catchList"></div>
</section>

<section id="stats">
  <div class="card">
    <b>Catch Statistics</b>
    <div id="statsBox" style="margin-top:10px;"></div>
  </div>
</section>

<section id="sea">
  <div class="card">
    <b>Sea Conditions & Fishing Score</b>
    <div class="row">
      <button onclick="loadSeaConditions()">Refresh</button>
    </div>
    <div id="seaBox" style="margin-top:10px;"></div>
  </div>
</section>

<section id="fishid">
  <div class="card">
    <b>Fish ID Helper</b>
    <div class="mini" style="margin-top:8px;">
      Best free option: upload a fish photo, then use Google Lens.
    </div>

    <label>Fish Photo</label>
    <input type="file" id="fishIdPhoto" accept="image/*">
    <div id="fishIdPreview"></div>

    <div class="row">
      <button onclick="openLens()">Open Google Lens</button>
      <button class="dark" onclick="copyFishToCatch()">Use selected species in Add Catch</button>
    </div>

    <label>Species</label>
    <select id="fishIdSpecies">
      <option value="">Choose...</option>
      <option>Cape Kob</option>
      <option>Yellowtail</option>
      <option>Bonito</option>
      <option>Red Roman</option>
      <option>Snapper</option>
      <option>Silverfish</option>
      <option>Red Steenbras</option>
      <option>Yellow Belly</option>
      <option>Galjoen</option>
      <option>Hottentot</option>
    </select>
  </div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const KEY_CATCHES="tanya_v33_catches";
const KEY_SPOTS="tanya_v33_spots";

const MIN_SIZE={
  "Cape Kob":60,
  "Yellowtail":60,
  "Bonito":0,
  "Red Roman":30,
  "Snapper":30,
  "Silverfish":25,
  "Red Steenbras":60,
  "Yellow Belly":30,
  "Galjoen":35,
  "Hottentot":22
};

const STILBAAI={lat:-34.37,lng:20.85};

const species=document.getElementById("species");
const lengthEl=document.getElementById("length");
const minSizeEl=document.getElementById("minSize");
const sizeNote=document.getElementById("sizeNote");
const depthEl=document.getElementById("depth");
const baitEl=document.getElementById("bait");
const coordsEl=document.getElementById("coords");
const notesEl=document.getElementById("notes");
const photoEl=document.getElementById("photo");
const photoPreview=document.getElementById("photoPreview");
const spotSelect=document.getElementById("spotSelect");

let photoData="";

species.addEventListener("change",()=>{
  const v=species.value;
  minSizeEl.value=MIN_SIZE[v] ?? "";
  if(v===""){
    sizeNote.textContent="Choose species to load legal size.";
    sizeNote.className="mini";
    return;
  }
  if((MIN_SIZE[v] ?? 0)===0){
    sizeNote.textContent="No minimum set for this species.";
    sizeNote.className="mini warn";
  }else{
    sizeNote.textContent="Minimum size: "+MIN_SIZE[v]+" cm";
    sizeNote.className="mini";
  }
});

function getAllCatches(){
  return JSON.parse(localStorage.getItem(KEY_CATCHES)||"[]");
}
function saveAllCatches(data){
  localStorage.setItem(KEY_CATCHES,JSON.stringify(data));
}
function getAllSpots(){
  return JSON.parse(localStorage.getItem(KEY_SPOTS)||"[]");
}
function saveAllSpots(data){
  localStorage.setItem(KEY_SPOTS,JSON.stringify(data));
}

function parseCoords(str){
  if(!str) return null;
  const p=String(str).split(",").map(x=>x.trim());
  if(p.length<2) return null;
  const lat=Number(p[0]);
  const lng=Number(p[1]);
  if(!Number.isFinite(lat)||!Number.isFinite(lng)) return null;
  return {lat,lng};
}

function showTab(id){
  document.querySelectorAll("section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";

  document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"));
  if(id==="add") btnAdd.classList.add("active");
  if(id==="mapTab") btnMap.classList.add("active");
  if(id==="log") btnLog.classList.add("active");
  if(id==="stats") btnStats.classList.add("active");
  if(id==="sea") btnSea.classList.add("active");
  if(id==="fishid") btnFish.classList.add("active");

  if(id==="mapTab") initMap();
  if(id==="log") renderLog();
  if(id==="stats") renderStats();
  if(id==="sea") loadSeaConditions();
  fillSpotDropdown();
}

function fillSpotDropdown(){
  const spots=getAllSpots();
  spotSelect.innerHTML=`<option value="">None</option>`;
  spots.forEach(s=>{
    const opt=document.createElement("option");
    opt.value=s.id;
    opt.textContent=`${s.type} • ${s.name}`;
    spotSelect.appendChild(opt);
  });
}

function fillFromSelectedSpot(){
  const id=spotSelect.value;
  if(!id) return;
  const s=getAllSpots().find(x=>String(x.id)===String(id));
  if(!s) return;
  coordsEl.value=s.coords;
}

function getGPS(){
  navigator.geolocation.getCurrentPosition(pos=>{
    coordsEl.value=pos.coords.latitude.toFixed(6)+","+pos.coords.longitude.toFixed(6);
  },()=>{
    alert("Could not get GPS");
  });
}

photoEl.addEventListener("change", async ()=>{
  const file=photoEl.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    photoData=reader.result;
    photoPreview.innerHTML=`<img class="photo" src="${photoData}">`;
  };
  reader.readAsDataURL(file);
});

function saveCatch(){
  if(!species.value){
    alert("Choose species");
    return;
  }

  const catches=getAllCatches();

  let finalCoords=coordsEl.value;
  const spotId=spotSelect.value;
  if(spotId){
    const s=getAllSpots().find(x=>String(x.id)===String(spotId));
    if(s) finalCoords=s.coords;
  }

  catches.push({
    id:Date.now(),
    species:species.value,
    length:lengthEl.value,
    minSize:minSizeEl.value,
    depth:depthEl.value,
    bait:baitEl.value,
    coords:finalCoords,
    notes:notesEl.value,
    photo:photoData,
    date:new Date().toLocaleDateString()
  });

  saveAllCatches(catches);
  clearCatchForm();
  showTab("log");
}

function clearCatchForm(){
  species.value="";
  lengthEl.value="";
  minSizeEl.value="";
  depthEl.value="";
  baitEl.value="";
  coordsEl.value="";
  notesEl.value="";
  photoEl.value="";
  photoData="";
  photoPreview.innerHTML="";
  sizeNote.textContent="Choose species to load legal size.";
  sizeNote.className="mini";
}

function renderLog(){
  const catches=getAllCatches().slice().reverse();
  const box=document.getElementById("catchList");
  box.innerHTML="";

  catches.forEach(c=>{
    box.innerHTML+=`
      <div class="card">
        <b>${c.species}</b><br>
        <div class="mini">${c.length||"—"} cm • Min ${c.minSize||"—"} • Depth ${c.depth||"—"}m</div>
        <div class="mini">📍 ${c.coords||"No coords"}</div>
        ${c.bait?`<div class="mini">Bait: ${c.bait}</div>`:""}
        ${c.notes?`<div class="mini">Notes: ${c.notes}</div>`:""}
        <div class="mini">${c.date}</div>
        ${c.photo?`<img class="photo" src="${c.photo}">`:""}
      </div>
    `;
  });

  if(catches.length===0){
    box.innerHTML=`<div class="card">No catches saved yet.</div>`;
  }
}

function renderStats(){
  const catches=getAllCatches();
  const box=document.getElementById("statsBox");
  if(catches.length===0){
    box.innerHTML="No catches yet.";
    return;
  }

  const bySpecies={};

  catches.forEach(c=>{
    if(!bySpecies[c.species]) bySpecies[c.species]=[];
    bySpecies[c.species].push(c);
  });

  let html="";
  Object.keys(bySpecies).forEach(sp=>{
    const list=bySpecies[sp];
    const depths=list.map(x=>Number(x.depth)).filter(x=>Number.isFinite(x));
    let avgDepth="—";
    if(depths.length){
      avgDepth=(depths.reduce((a,b)=>a+b,0)/depths.length).toFixed(1);
    }
    html+=`
      <div class="card">
        <b>${sp}</b><br>
        <div class="mini">Catches: ${list.length}</div>
        <div class="mini">Best depth average: ${avgDepth} m</div>
      </div>
    `;
  });

  box.innerHTML=html;
}

function moonPhase(date=new Date()){
  const lp=2551443;
  const newMoon=new Date(Date.UTC(1970,0,7,20,35,0));
  const phase=((date.getTime()-newMoon.getTime())/1000)%lp;
  const day=Math.floor(phase/(24*3600));
  if(day<2) return "New Moon";
  if(day<7) return "Waxing Crescent";
  if(day<9) return "First Quarter";
  if(day<15) return "Waxing Gibbous";
  if(day<17) return "Full Moon";
  if(day<22) return "Waning Gibbous";
  if(day<24) return "Last Quarter";
  return "Waning Crescent";
}

async function loadSeaConditions(){
  const box=document.getElementById("seaBox");
  box.innerHTML="Loading...";
  const p=parseCoords(coordsEl.value)||STILBAAI;

  try{
    const weatherUrl=`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&current=wind_speed_10m,wind_direction_10m&timezone=Africa%2FJohannesburg`;
    const marineUrl=`https://marine-api.open-meteo.com/v1/marine?latitude=${p.lat}&longitude=${p.lng}&current=wave_height,swell_wave_height,sea_surface_temperature&timezone=Africa%2FJohannesburg`;

    const [wr,mr]=await Promise.all([fetch(weatherUrl),fetch(marineUrl)]);
    const w=await wr.json();
    const m=await mr.json();

    const wind=Number(w?.current?.wind_speed_10m);
    const wave=Number(m?.current?.wave_height);
    const swell=Number(m?.current?.swell_wave_height);
    const temp=Number(m?.current?.sea_surface_temperature);

    let score=100;
    if(Number.isFinite(wind)) score-=Math.max(0,wind-12)*1.2;
    if(Number.isFinite(swell)) score-=Math.max(0,swell-0.8)*18;
    if(Number.isFinite(wave)) score-=Math.max(0,wave-0.7)*22;

    const moon=moonPhase();
    if(moon==="Full Moon"||moon==="New Moon") score+=5;

    score=Math.max(0,Math.min(100,Math.round(score)));

    box.innerHTML=`
      <div class="chip ${score>=70?"good":score>=50?"warn":"bad"}">Fishing score: ${score}/100</div>
      <div class="mini" style="margin-top:10px;">Wind: ${Number.isFinite(wind)?wind.toFixed(0)+" km/h":"—"}</div>
      <div class="mini">Wave: ${Number.isFinite(wave)?wave.toFixed(2)+" m":"—"}</div>
      <div class="mini">Swell: ${Number.isFinite(swell)?swell.toFixed(2)+" m":"—"}</div>
      <div class="mini">Sea Temp: ${Number.isFinite(temp)?temp.toFixed(1)+" °C":"—"}</div>
      <div class="mini">Moon: ${moon}</div>
    `;
  }catch{
    box.innerHTML="Could not load sea conditions.";
  }
}

let map;
let satLayer;
let osmLayer;
let satOn=false;
let catchMarkers=[];
let spotMarkers=[];

function initMap(){
  if(map) return;

  map=L.map("map").setView([STILBAAI.lat,STILBAAI.lng],10);

  osmLayer=L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
  ).addTo(map);

  satLayer=L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
  );

  map.on("click",(e)=>{
    const lat=e.latlng.lat.toFixed(6);
    const lng=e.latlng.lng.toFixed(6);
    const coordStr=lat+","+lng;

    const autoName=`Spot ${lat}, ${lng}`;
    const name=prompt("Spot name?", autoName);
    if(name===null) return;

    const type=prompt("Type: Reef or Spot?", "Reef");
    if(type===null) return;

    const spots=getAllSpots();
    const newSpot={
      id:Date.now(),
      name:name.trim()||autoName,
      type:type.trim()||"Spot",
      coords:coordStr
    };
    spots.push(newSpot);
    saveAllSpots(spots);
    fillSpotDropdown();
    spotSelect.value=String(newSpot.id);
    renderMap();
  });

  renderMap();
}

function renderMap(){
  if(!map) return;

  catchMarkers.forEach(m=>map.removeLayer(m));
  spotMarkers.forEach(m=>map.removeLayer(m));
  catchMarkers=[];
  spotMarkers=[];

  getAllCatches().forEach(c=>{
    const p=parseCoords(c.coords);
    if(!p) return;
    const m=L.marker([p.lat,p.lng]).addTo(map);
    m.bindPopup(`<b>${c.species}</b><br>${c.coords||""}`);
    catchMarkers.push(m);
  });

  // known spots
  KNOWN_SPOTS.forEach(s=>{
    const p=parseCoords(s.coords);
    if(!p) return;
    const m=L.circleMarker([p.lat,p.lng],{
      radius:7,
      color:s.type==="Reef"?"#ffd166":"#2fa4ff",
      weight:2,
      fillOpacity:0.5
    }).addTo(map);
    m.bindPopup(`<b>${s.type} • ${s.name}</b><br>${s.coords}<br><button onclick="goToSpotInMap('${s.coords}')">Open on Map</button>`);
    spotMarkers.push(m);
  });

  // my spots
  getAllSpots().forEach(s=>{
    const p=parseCoords(s.coords);
    if(!p) return;
    const m=L.circleMarker([p.lat,p.lng],{
      radius:8,
      color:s.type==="Reef"?"#ff8c42":"#7cf0ff",
      weight:2,
      fillOpacity:0.6
    }).addTo(map);
    m.bindPopup(`<b>${s.type} • ${s.name}</b><br>${s.coords}`);
    spotMarkers.push(m);
  });
}

function toggleSatellite(){
  satOn=!satOn;

  if(satOn){
    map.removeLayer(osmLayer);
    satLayer.addTo(map);
  }else{
    map.removeLayer(satLayer);
    osmLayer.addTo(map);
  }
}

function centerOnStilbaai(){
  if(!map) return;
  map.setView([STILBAAI.lat,STILBAAI.lng],10);
}

function goToSpotInMap(coordStr){
  const p=parseCoords(coordStr);
  if(!p) return;

  showTab("mapTab");

  setTimeout(()=>{
    map.setView([p.lat,p.lng],15);

    if(!satOn){
      satOn=true;
      map.removeLayer(osmLayer);
      satLayer.addTo(map);
    }

    L.popup()
      .setLatLng([p.lat,p.lng])
      .setContent(`<b>Spot</b><br>${coordStr}`)
      .openOn(map);
  },200);
}

function renderKnownSpots(){
  // not used in V33
}

function renderMySpots(){
  // not used in V33
}

function openLens(){
  window.open("https://lens.google.com/upload","_blank");
}

function copyFishToCatch(){
  const fish=document.getElementById("fishIdSpecies").value;
  if(!fish) return;
  species.value=fish;
  species.dispatchEvent(new Event("change"));
  showTab("add");
}

document.getElementById("fishIdPhoto").addEventListener("change",async(e)=>{
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    document.getElementById("fishIdPreview").innerHTML=`<img class="photo" src="${reader.result}">`;
  };
  reader.readAsDataURL(file);
});

showTab("add");
fillSpotDropdown();

</script>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
      </html>
