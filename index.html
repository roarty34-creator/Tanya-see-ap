<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing PRO</title>

<style>
body{margin:0;font-family:Arial;background:#061225;color:white;}
header{padding:15px;text-align:center;background:#0a1835;font-size:20px;}
.card{background:#0f1c38;margin:10px;padding:15px;border-radius:12px;}
button{padding:10px;background:#2fa4ff;border:none;color:white;border-radius:8px;}
input,select{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:none;}
.tab{display:flex;}
.tab button{flex:1;margin:2px;}
.hidden{display:none;}
.ok{color:#39d98a;}
.warn{color:#ff8c42;}
</style>

</head>
<body>

<header>🎣 Fishing PRO</header>

<div class="tab">
<button onclick="show('sw')">🌊</button>
<button onclick="show('log')">📒</button>
<button onclick="show('ai')">🧠</button>
<button onclick="show('gps')">📍</button>
<button onclick="show('regs')">⚖️</button>
</div>

<!-- SW -->
<div id="sw" class="card">
<h3>Ocean Conditions</h3>
<p id="wave">Wave: 1.2m</p>
<p id="temp">Temp: 19°C</p>
<p id="tide">Tide: Rising</p>
<p id="score"></p>
</div>

<!-- LOG -->
<div id="log" class="card hidden">
<select id="fish">
<option>Kob</option>
<option>Yellowtail</option>
<option>Hottentot</option>
<option>Roman</option>
</select>

<input id="size" placeholder="Size cm">
<input id="bait" placeholder="Bait">

<button onclick="save()">Save</button>

<ul id="list"></ul>
</div>

<!-- AI -->
<div id="ai" class="card hidden">
<button onclick="ai()">Run AI</button>
<p id="aiout"></p>
</div>

<!-- GPS -->
<div id="gps" class="card hidden">
<button onclick="gps()">Save Spot</button>
<ul id="spots"></ul>
</div>

<!-- REGS -->
<div id="regs" class="card hidden">
<select id="rfish">
<option>Kob</option>
<option>Hottentot</option>
<option>Yellowtail</option>
</select>

<input id="rsize" placeholder="Size cm">
<button onclick="check()">Check</button>
<p id="result"></p>
</div>

<script>

// tabs
function show(id){
document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
}

// fake ocean (WORKS ALWAYS)
function load(){
let wave = (Math.random()*2).toFixed(1);
let temp = 16 + Math.floor(Math.random()*6);
let tide = Math.random()>0.5 ? "Rising" : "Falling";

waveEl.innerText="Wave: "+wave+"m";
tempEl.innerText="Temp: "+temp+"°C";
tideEl.innerText="Tide: "+tide;

let score=50;
if(wave<1.5)score+=20;
if(temp>17)score+=10;
if(tide=="Rising")score+=10;

scoreEl.innerText="Fishing Score: "+score+"/100";
}

let waveEl=document.getElementById("wave");
let tempEl=document.getElementById("temp");
let tideEl=document.getElementById("tide");
let scoreEl=document.getElementById("score");

load();

// log
function save(){
let log=JSON.parse(localStorage.getItem("log")||"[]");
log.push({
fish:fish.value,
size:size.value,
bait:bait.value
});
localStorage.setItem("log",JSON.stringify(log));
render();
}

function render(){
let log=JSON.parse(localStorage.getItem("log")||"[]");
list.innerHTML="";
log.forEach(l=>{
let li=document.createElement("li");
li.innerText=l.fish+" "+l.size+"cm ("+l.bait+")";
list.appendChild(li);
});
}
render();

// AI
function ai(){
let log=JSON.parse(localStorage.getItem("log")||"[]");
let count={};

log.forEach(l=>{
count[l.bait]=(count[l.bait]||0)+1;
});

let best=Object.keys(count).sort((a,b)=>count[b]-count[a])[0];

aiout.innerText="Best bait: "+(best||"No data");
}

// GPS
function gps(){
navigator.geolocation.getCurrentPosition(pos=>{
let s=JSON.parse(localStorage.getItem("spots")||"[]");
s.push(pos.coords.latitude+","+pos.coords.longitude);
localStorage.setItem("spots",JSON.stringify(s));
renderSpots();
});
}

function renderSpots(){
let s=JSON.parse(localStorage.getItem("spots")||"[]");
spots.innerHTML="";
s.forEach(x=>{
let li=document.createElement("li");
li.innerText=x;
spots.appendChild(li);
});
}
renderSpots();

// regs
let rules={Kob:60,Hottentot:22,Yellowtail:60};

function check(){
let s=parseInt(rsize.value);
let f=rfish.value;

if(s>=rules[f]){
result.innerHTML="<span class='ok'>Legal ✔</span>";
}else{
result.innerHTML="<span class='warn'>Too small ✖</span>";
}
}

</script>

</body>
</html>
