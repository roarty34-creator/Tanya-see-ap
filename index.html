<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tanya Deep Sea Fishing App</title>

<link rel="manifest" href="manifest.webmanifest">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
background:#061225;
color:white;
font-family:Arial;
padding:15px;
}

h1{
margin:0;
font-size:26px;
}

.nav{
margin-top:15px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.nav button{
background:#0f1c38;
border:none;
padding:10px;
border-radius:10px;
color:white;
font-weight:bold;
}

.card{
background:#0f1c38;
padding:14px;
border-radius:12px;
margin-top:12px;
}

label{
font-size:12px;
color:#9fb0d0;
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
background:#081632;
border:none;
border-radius:10px;
color:white;
}

#map{
height:380px;
margin-top:10px;
border-radius:12px;
}

.table{
width:100%;
font-size:13px;
margin-top:10px;
}

.table td{
padding:6px;
border-bottom:1px solid #1a2c52;
}

.good{
color:#39d98a;
}

.bad{
color:#ff8c42;
}

.rig{
font-family:monospace;
font-size:13px;
margin-top:8px;
}

</style>
</head>

<body>

<h1>Tanya Deep Sea Fishing App</h1>
<div style="font-size:12px;color:#9fb0d0;">V85 Stable</div>

<div class="nav">
<button onclick="tab('add')">Add Catch</button>
<button onclick="tab('nav')">Spots & Navigate</button>
<button onclick="tab('weather')">Weather</button>
<button onclick="tab('fish')">Fish Info</button>
</div>

<section id="add">

<div class="card">

<label>Species</label>
<select id="species" onchange="loadFishInfo()">
<option value="">Choose</option>
<option>Cape Kob</option>
<option>Yellowtail</option>
<option>Bonito</option>
<option>Red Roman</option>
<option>Snapper</option>
<option>Silverfish</option>
</select>

<label>Size caught (cm)</label>
<input id="size">

<label>Coordinates</label>
<input id="coords">

<label>Where caught</label>
<input id="where">

<button onclick="saveCatch()">Save Catch</button>

</div>

</section>

<section id="nav" style="display:none">

<div class="card">

<label>Next Spot</label>
<select id="nextSpot"></select>

<label>Boat speed km/h</label>
<input id="speed" value="25">

<button onclick="startNav()">Start Navigation</button>

<div id="navResult" style="margin-top:10px;font-size:13px;"></div>

<div id="map"></div>

</div>

</section>

<section id="weather" style="display:none">

<div class="card">

<b>7 Day Weather</b>

<table class="table" id="weatherTable"></table>

</div>

</section>

<section id="fish" style="display:none">

<div class="card">

<h3>Fish Info</h3>

<div id="fishInfo"></div>

</div>

</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const HARBOUR = {lat:-34.373,lon:21.421}

const SPOTS=[
{name:"Skulpbank",lat:-34.3905,lon:20.8602},
{name:"Blinde Rif",lat:-34.4015,lon:20.8801},
{name:"Roman Bank",lat:-34.4200,lon:20.8650}
]

let map

function tab(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"

if(id==="nav"){
initMap()
loadSpots()
}

if(id==="weather"){
loadWeather()
}

}

function initMap(){

if(map) return

map=L.map('map').setView([HARBOUR.lat,HARBOUR.lon],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

L.marker([HARBOUR.lat,HARBOUR.lon]).addTo(map).bindPopup("Stilbaai Harbour")

}

function loadSpots(){

let s=document.getElementById("nextSpot")

s.innerHTML=""

SPOTS.forEach(p=>{
let o=document.createElement("option")
o.value=p.lat+","+p.lon
o.textContent=p.name
s.appendChild(o)
})

}

function startNav(){

let v=document.getElementById("nextSpot").value.split(",")

let lat=Number(v[0])
let lon=Number(v[1])

let d=distance(HARBOUR.lat,HARBOUR.lon,lat,lon)

let bearing=getBearing(HARBOUR.lat,HARBOUR.lon,lat,lon)

let area = lon > HARBOUR.lon ? "Marine Area (East)" : "Jongensfontein side (West)"

document.getElementById("navResult").innerHTML=

"Distance: "+d.toFixed(2)+" km<br>"+
"Bearing: "+bearing.toFixed(0)+"°<br>"+
"Direction: "+area

}

function distance(a,b,c,d){

let R=6371

let dLat=(c-a)*Math.PI/180

let dLon=(d-b)*Math.PI/180

let x=Math.sin(dLat/2)**2+

Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2

return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))

}

function getBearing(a,b,c,d){

let y=Math.sin((d-b)*Math.PI/180)*Math.cos(c*Math.PI/180)

let x=Math.cos(a*Math.PI/180)*Math.sin(c*Math.PI/180)-

Math.sin(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.cos((d-b)*Math.PI/180)

return (Math.atan2(y,x)*180/Math.PI+360)%360

}

async function loadWeather(){

let url=`https://api.open-meteo.com/v1/forecast?latitude=${HARBOUR.lat}&longitude=${HARBOUR.lon}&daily=wind_speed_10m_max,temperature_2m_max&forecast_days=7`

let r=await fetch(url)

let j=await r.json()

let t=""

for(let i=0;i<7;i++){

let wind=j.daily.wind_speed_10m_max[i]

let day=new Date(j.daily.time[i]).toLocaleDateString()

let sea = wind < 20 ? "Good sea day" : "Rough sea"

let cls = wind < 20 ? "good":"bad"

t+=`<tr>
<td>${day}</td>
<td>${wind} km/h</td>
<td class="${cls}">${sea}</td>
</tr>`

}

document.getElementById("weatherTable").innerHTML=t

}

function loadFishInfo(){

let s=document.getElementById("species").value

let info={

"Cape Kob":{
bait:"Chokka + Pilchard combo",
rig:"Running sinker rig",
draw:`Rod
 |
Sinker
 |
Swivel
 |
Leader
 |
Hook`
},

"Yellowtail":{
bait:"Live Makriel",
rig:"Surface lure / live bait rig",
draw:`Rod
 |
Leader
 |
Live bait hook`
},

"Bonito":{
bait:"Small spoon",
rig:"Feather rig",
draw:`Rod
 |
Feather lure`
}

}

let f=info[s]

if(!f) return

document.getElementById("fishInfo").innerHTML=

"<b>Preferred bait</b><br>"+f.bait+

"<br><br><b>Rig</b><br>"+f.rig+

"<div class='rig'>"+f.draw+"</div>"

}

function saveCatch(){

alert("Catch saved")

}

</script>

</body>
</html>
